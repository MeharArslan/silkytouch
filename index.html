//  PAYMENT REMINDERS PAGE
// ═══════════════════════════════════════════════════════════════
function PaymentReminders({invoices,vendors,addNotif,addToast}){
  const [sentReminders,setSentReminders]=React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('st_sentReminders')||'{}');}catch(e){return{};}
  });
  const markSent=(invId)=>{
    const updated={...sentReminders,[invId]:new Date().toLocaleDateString('en-PK')};
    setSentReminders(updated);
    try{localStorage.setItem('st_sentReminders',JSON.stringify(updated));}catch(e){}
  };
  const T=useTheme();
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const pending=(invoices||[]).filter(i=>i.paymentStatus!=="Received"&&i.status==="Posted");
  const getStatus=(inv)=>{
    if(!inv.dueDate) return{label:"No Due Date",color:"#94a3b8",priority:4};
    if(inv.dueDate<today) return{label:"Overdue",color:"#ef4444",priority:1};
    if(inv.dueDate===today) return{label:"Due Today",color:"#f97316",priority:2};
    if(inv.dueDate===tomorrow) return{label:"Due Tomorrow",color:"#f59e0b",priority:3};
    return{label:"Upcoming",color:"#3b82f6",priority:4};
  };
  const makeWaMsg=(inv,type)=>{
    const vdr=vendors.find(v=>String(v.id)===String(inv.vendorId));
    const vName=vdr?.name||inv.vendorName||"Vendor";
    const rawPhone=vdr?.contact||inv.vendorContact||"";
    const amt="PKR "+(parseFloat(inv.total)||0).toLocaleString("en-PK");
    let msg="";
    if(type==="overdue") msg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nThis is to inform you that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is now ~*OVERDUE*~. Kindly arrange the payment at the earliest to avoid any inconvenience.\n\nWe look forward to your immediate response.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
    else if(type==="today") msg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nThis is a reminder that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is due *TODAY*. Kindly ensure the payment is processed on time.\n\nWe appreciate your prompt support.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
    else if(type==="tomorrow") msg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nI hope you are doing well. This is a reminder that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is due tomorrow. Kindly arrange to clear the payment within the due date.\n\nThank you for your cooperation.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
    else msg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nThis is a payment reminder for Invoice# *"+inv.invoiceNo+"* of *`"+amt+"`*. Kindly clear the outstanding payment at your earliest convenience.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
    if(rawPhone){const digits=rawPhone.replace(/[^0-9]/g,"");const phone=digits.startsWith("92")?digits:digits.startsWith("0")?("92"+digits.slice(1)):("92"+digits);return "https://wa.me/"+phone+"?text="+encodeURIComponent(msg);}
    return "https://wa.me/?text="+encodeURIComponent(msg);
  };
  const sorted=[...pending].sort((a,b)=>getStatus(a).priority-getStatus(b).priority);
  return(
    <div style={{padding:"clamp(12px,3vw,24px)"}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:"clamp(16px,4vw,20px)",fontWeight:800,color:T.text,margin:0}}>Payment Reminders</h2>
        <p style={{fontSize:13,color:T.muted,marginTop:4}}>{pending.length} pending payments</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:20}}>
        {[["Overdue",pending.filter(i=>i.dueDate&&i.dueDate<today).length,"#ef4444","#fef2f2"],["Due Today",pending.filter(i=>i.dueDate===today).length,"#f97316","#fff7ed"],["Tomorrow",pending.filter(i=>i.dueDate===tomorrow).length,"#f59e0b","#fffbeb"],["Upcoming",pending.filter(i=>i.dueDate&&i.dueDate>tomorrow).length,"#3b82f6","#eff6ff"]].map(([l,c,col,bg])=>(
          <div key={l} style={{background:bg,border:"1px solid "+col+"40",borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{fontSize:"clamp(18px,4vw,24px)",fontWeight:900,color:col}}>{c}</div>
            <div style={{fontSize:11,color:col,fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{background:T.surface,borderRadius:12,border:"1px solid "+T.border,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%",minWidth:500,borderCollapse:"collapse"}}>
          <thead>
            <tr style={{borderBottom:"2px solid "+T.border}}>
              {["Invoice#","Vendor","Amount","Due Date","Ageing","Status","Reminder"].map(h=>(
                <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:0.5,whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:T.muted}}>No pending payments!</td></tr>}
            {sorted.map(inv=>{
              const st=getStatus(inv);
              const vdr=vendors.find(v=>String(v.id)===String(inv.vendorId));
              const type=inv.dueDate&&inv.dueDate<today?"overdue":inv.dueDate===today?"today":inv.dueDate===tomorrow?"tomorrow":"custom";
              return(
                <tr key={inv.id} style={{borderBottom:"1px solid "+T.border}}>
                  <td style={{padding:"10px 12px",fontWeight:700,color:"#60a5fa",fontSize:13}}>{inv.invoiceNo}</td>
                  <td style={{padding:"10px 12px",fontSize:13,color:T.text}}>{inv.vendorName||vdr?.name||"—"}</td>
                  <td style={{padding:"10px 12px",fontWeight:700,color:"#10b981",fontSize:13}}>PKR {(parseFloat(inv.total)||0).toLocaleString("en-PK")}</td>
                  <td style={{padding:"10px 12px",fontSize:12,color:T.muted}}>{inv.dueDate||"—"}</td>
                  {/* Ageing column */}
                  <td style={{padding:"10px 12px",fontSize:12}}>
                    {inv.dueDate?(()=>{
                      const days=Math.round((new Date()-new Date(inv.dueDate))/(864e5));
                      if(days>0) return <span style={{color:"#ef4444",fontWeight:700}}>{days}d overdue</span>;
                      if(days===0) return <span style={{color:"#f97316",fontWeight:700}}>Today</span>;
                      return <span style={{color:"#3b82f6",fontWeight:600}}>{Math.abs(days)}d left</span>;
                    })():<span style={{color:"#64748b"}}>—</span>}
                  </td>
                  {/* Status column */}
                  <td style={{padding:"10px 12px"}}><span style={{background:st.color+"22",color:st.color,padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{st.label}</span></td>
                  {/* WhatsApp + Sent Status */}
                  <td style={{padding:"8px 12px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-start"}}>
                      <a href={makeWaMsg(inv,type)} target="_blank" rel="noreferrer"
                        onClick={()=>{markSent(inv.id);addNotif&&addNotif("success","Reminder Sent","WA reminder sent to "+(inv.vendorName||vdr?.name||"vendor"));}}
                        style={{display:"inline-flex",alignItems:"center",gap:6,background:"#25D366",color:"white",padding:"7px 14px",borderRadius:8,textDecoration:"none",whiteSpace:"nowrap"}}>
                        <svg width="16" height="16" viewBox="0 0 32 32" fill="white"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.469.671 4.783 1.84 6.77L2 30l7.43-1.804A13.94 13.94 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.5a11.44 11.44 0 0 1-5.832-1.594l-.418-.248-4.33 1.051 1.084-4.218-.272-.433A11.465 11.465 0 0 1 4.5 16C4.5 9.649 9.649 4.5 16 4.5S27.5 9.649 27.5 16 22.351 27.5 16 27.5zm6.29-8.617c-.344-.172-2.036-1.004-2.351-1.118-.316-.115-.546-.172-.776.172s-.89 1.118-1.09 1.348c-.2.23-.4.258-.744.086-.344-.172-1.453-.535-2.768-1.709-1.023-.913-1.713-2.04-1.913-2.384-.2-.344-.021-.53.15-.701.155-.154.344-.4.516-.6.172-.2.23-.344.344-.573.115-.23.058-.43-.029-.602-.086-.172-.776-1.87-1.063-2.563-.28-.672-.564-.58-.776-.59l-.66-.011c-.23 0-.602.086-.917.43s-1.204 1.176-1.204 2.868 1.233 3.326 1.405 3.556c.172.23 2.428 3.709 5.883 5.202.822.355 1.464.567 1.964.726.825.263 1.576.226 2.17.137.662-.099 2.036-.832 2.323-1.636.286-.804.286-1.493.2-1.636-.085-.143-.315-.23-.659-.4z"/></svg>
                        WhatsApp
                      </a>
                      {sentReminders[inv.id]?
                        <span style={{fontSize:10,color:"#10b981",fontWeight:700}}>✅ Sent {sentReminders[inv.id]}</span>:
                        <span style={{fontSize:10,color:"#64748b"}}>Not sent</span>
                      }
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {sorted.length>0&&<div style={{padding:"10px 12px",borderTop:"1px solid "+T.border,display:"flex",justifyContent:"space-between",fontSize:13}}>
          <span style={{color:T.muted}}>Total: <strong style={{color:T.text}}>{pending.length} invoices</strong></span>
          <strong style={{color:"#ef4444"}}>PKR {pending.reduce((s,i)=>s+(parseFloat(i.total)||0),0).toLocaleString("en-PK")}</strong>
        </div>}
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(()=>{
    try{
      const saved=localStorage.getItem("st_user");
      return saved?JSON.parse(saved):null;
    }catch(e){return null;}
  });
  const [page,setPage]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const {toasts,add,rm}=useToast();

  // Global state
  // ── localStorage helpers (fast local cache) ──
  const userUid = user?.id||"guest";
  const lsKey=(k)=>`st_${k}`;
  const loadLS=(key,def)=>{try{const d=localStorage.getItem(lsKey(key));return d?JSON.parse(d):def;}catch(e){return def;}};
  const saveLS=(key,val)=>{try{localStorage.setItem(lsKey(key),JSON.stringify(val));}catch(e){}};

  // ── State: load from localStorage first (instant), then sync Firestore ──
  const [dataLoaded,setDataLoaded]=useState(false);
  const [bizInfo,setBizInfo]=useState(()=>loadLS("biz",INIT_BIZ));
  const [employees,setEmployees]=useState(()=>loadLS("employees",[]));
  const [vendors,setVendors]=useState(()=>loadLS("vendors",INIT_VENDORS));
  const [stock,setStock]=useState(()=>loadLS("stock",INIT_STOCK));
  const [invoices,setInvoices]=useState(()=>loadLS("invoices",INIT_INVOICES));
  const [pos,setPos]=useState(()=>loadLS("pos",INIT_POS));
  const [movements,setMovements]=useState(()=>loadLS("movements",INIT_MOVEMENTS));
  const [expenses,setExpenses]=useState(()=>loadLS("expenses",INIT_EXPENSES));
  const [audit,setAudit]=useState(()=>loadLS("audit",INIT_AUDIT));
  const [notifs,setNotifs]=useState(()=>loadLS("notifs",NOTIF_INIT));
  const [users,setUsers]=useState(()=>loadLS("users",INIT_USERS));

  // ── Load data from Firestore when user logs in ──
  // Auto-close sidebar on mobile when page changes
  useEffect(()=>{
    if(window.innerWidth < 768) setSidebarOpen(false);
  },[page]);

    useEffect(()=>{
    if(!user) return;
    const loadFromCloud=async()=>{
      try{
        // Check if local data already exists (most recent = local)
        const hasLocalData = localStorage.getItem('st_vendors') || localStorage.getItem('st_invoices');
        if(window.loadUserData && !hasLocalData){
          // Only load from cloud if NO local data (first login on new device)
          const cloudData=await window.loadUserData(userUid).catch(()=>null);
          if(cloudData){
            if(cloudData.biz)      setBizInfo(cloudData.biz);
            if(cloudData.vendors)  setVendors(cloudData.vendors);
            if(cloudData.stock)    setStock(cloudData.stock);
            if(cloudData.invoices) setInvoices(cloudData.invoices);
            if(cloudData.pos)      setPos(cloudData.pos);
            if(cloudData.expenses) setExpenses(cloudData.expenses);
            if(cloudData.users)    setUsers(cloudData.users);
            if(cloudData.employees){setEmployees(cloudData.employees);window.__empLocalCount=cloudData.employees.length;}
            if(cloudData.audit&&cloudData.audit.length>0){setAudit(cloudData.audit.slice(0,500));}
            if(cloudData.notifs){setNotifs(cloudData.notifs.slice(0,100));}
            if(cloudData.movements)setMovements(cloudData.movements);
            console.log('Loaded data from cloud (new device)');
          }
        }
        // Data is already loaded from localStorage via useState initializers
        // Push local data to Firebase to keep it synced
        if(window.fbDB && navigator.onLine && hasLocalData){
          const keys=['biz','vendors','stock','invoices','pos','expenses'];
          const batch={updatedAt:Date.now()};
          keys.forEach(k=>{try{const v=localStorage.getItem('st_'+k);if(v)batch[k]=v;}catch(e){}});
          window.fbDB.collection('shared').doc('main').set(batch,{merge:true}).catch(()=>{});
        }
      }catch(err){
        console.warn('Cloud sync failed - using local data:',err);
      }finally{
        // ALWAYS show app - never block on network failure
        setDataLoaded(true);
        if(window.__hideSplash) window.__hideSplash();
      }
    };
    loadFromCloud();
    // Auto-sync when internet comes back
    window.addEventListener('online', function(){
      console.log('Online - syncing data...');
      loadFromCloud();
    });
  },[user?.id]);

  // ── Auto-save: localStorage (instant) + Firestore (cloud) ──
  const cloudSave=(key,val)=>{
    saveLS(key,val);
    if(window.saveUserData) window.saveUserData(userUid, key, val);
  };
  useEffect(()=>{if(dataLoaded)cloudSave("biz",bizInfo);},[bizInfo]);
  useEffect(()=>{
    if(dataLoaded&&employees!==undefined){
      window.__empSaveTime=Date.now();
      window.__empLocalCount=employees.length;
      cloudSave("employees",employees);
    }
  },[employees]);
  useEffect(()=>{if(dataLoaded)cloudSave("vendors",vendors);},[vendors]);
  useEffect(()=>{if(dataLoaded)cloudSave("stock",stock);},[stock]);
  useEffect(()=>{if(dataLoaded)cloudSave("invoices",invoices);},[invoices]);
  useEffect(()=>{if(dataLoaded)cloudSave("pos",pos);},[pos]);
  useEffect(()=>{if(dataLoaded)cloudSave("movements",movements);},[movements]);
  useEffect(()=>{if(dataLoaded)cloudSave("expenses",expenses);},[expenses]);
  useEffect(()=>{if(dataLoaded)cloudSave("users",users);},[users]);
  useEffect(()=>{if(dataLoaded)cloudSave("audit",audit);},[audit]);
  useEffect(()=>{if(dataLoaded)cloudSave("notifs",notifs);},[notifs]);

  // Wired audit trail
  const addAudit=useCallback((action,module,detail)=>{
    setAudit(p=>[{id:uid(),user:user?.name||"System",action,module,detail,ts:nowStr()},...p].slice(0,200));
  },[user]);

  const addNotif=useCallback((type,title,body,url)=>{
    setNotifs(p=>[{id:uid(),type,title,url:url||null,body,ts:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),read:false},...p].slice(0,30));
  },[]);

  const lowCount=stock.filter(i=>i.qty<=i.minQty).length;
  useEffect(()=>{
    stock.filter(i=>i.qty===0).forEach(i=>addNotif("danger","Out of Stock",i.name+" is out of stock!"));
    stock.filter(i=>i.qty>0&&i.qty<=i.minQty).forEach(i=>addNotif("warning","Low Stock",i.name+" — only "+i.qty+" left."));
  },[]);

  // ── Payment Due Date Check - runs on app open & every 5 minutes ──
  const checkDuePayments=()=>{
    if(!invoices||!invoices.length) return;
    const today=new Date().toISOString().slice(0,10);
    const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);

    // Per-invoice per-day per-type tracking
    const wasAlerted=(invId,type,date)=>{
      try{return localStorage.getItem("st_alrt_"+invId+"_"+type+"_"+date)==="1";}catch(e){return false;}
    };
    const setAlerted=(invId,type,date)=>{
      try{localStorage.setItem("st_alrt_"+invId+"_"+type+"_"+date,"1");}catch(e){}
    };

    invoices.forEach(inv=>{
      if(!inv.dueDate||inv.paymentStatus==="Received") return;
      const vdr=vendors.find(v=>String(v.id)===String(inv.vendorId)||v.name===inv.vendorName);
      const vName=vdr?.name||inv.vendorName||"Vendor";
      const rawPhone=vdr?.contact||inv.vendorContact||"";
      const amt="PKR "+(parseFloat(inv.total)||0).toLocaleString("en-PK");

      const makeWaUrl=(msgText)=>{
        const encoded=encodeURIComponent(msgText);
        if(rawPhone){
          const digits=rawPhone.replace(/[^0-9]/g,"");
          const phone=digits.startsWith("92")?digits:digits.startsWith("0")?("92"+digits.slice(1)):("92"+digits);
          return "https://wa.me/"+phone+"?text="+encoded;
        }
        return "https://wa.me/?text="+encoded;
      };

      const tomorrowMsg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nI hope you are doing well. This is a reminder that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is due tomorrow. Kindly arrange to clear the payment within the due date.\n\nThank you for your cooperation.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
      const todayMsg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nThis is a reminder that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is due *TODAY*. Kindly ensure the payment is processed on time.\n\nWe appreciate your prompt support.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";
      const overdueMsg="*Assalam-O-Alaikum!*\n*Dear "+vName+",*\n\nThis is to inform you that payment of *`"+amt+"`* against Invoice# *"+inv.invoiceNo+"* is now ~*OVERDUE*~. Kindly arrange the payment at the earliest to avoid any inconvenience.\n\nWe look forward to your immediate response.\n\n*Regards,*\n*Mehar Ejaz*\n*Silky Touch*\n*Meher Enterprises Limited*";

      if(inv.dueDate<today){
        // Overdue - alert once per day
        if(!wasAlerted(inv.id,"overdue",today)){
          addNotif("danger","🚨 OVERDUE: "+inv.invoiceNo,vName+" — "+amt+" overdue!",makeWaUrl(overdueMsg));window.sendPushNotif&&window.sendPushNotif("🚨 OVERDUE: "+inv.invoiceNo,vName+" — "+amt+" payment overdue!");try{const sr=JSON.parse(localStorage.getItem("st_sentReminders")||"{}");sr[inv.id]="Auto:"+new Date().toLocaleDateString("en-PK");localStorage.setItem("st_sentReminders",JSON.stringify(sr));}catch(e){}
          addAudit&&addAudit("Payment Overdue","Invoice","OVERDUE: "+inv.invoiceNo+" — "+vName);
          setAlerted(inv.id,"overdue",today);
        }
      } else if(inv.dueDate===today){
        // Due today - alert once per day
        if(!wasAlerted(inv.id,"today",today)){
          addNotif("danger","💰 DUE TODAY: "+inv.invoiceNo,vName+" — "+amt+" due today",makeWaUrl(todayMsg));window.sendPushNotif&&window.sendPushNotif("💰 DUE TODAY: "+inv.invoiceNo,vName+" — "+amt+" due today!");
          addAudit&&addAudit("Payment Due","Invoice","Due today: "+inv.invoiceNo+" — "+vName);
          setAlerted(inv.id,"today",today);
        }
      } else if(inv.dueDate===tomorrow){
        // Due tomorrow - alert once per day
        if(!wasAlerted(inv.id,"tomorrow",today)){
          addNotif("warning","⚠️ Due Tomorrow: "+inv.invoiceNo,vName+" — "+amt+" due tomorrow",makeWaUrl(tomorrowMsg));window.sendPushNotif&&window.sendPushNotif("⚠️ Due Tomorrow: "+inv.invoiceNo,vName+" — "+amt+" due tomorrow");
          addAudit&&addAudit("Payment Reminder","Invoice","Due tomorrow: "+inv.invoiceNo+" — "+vName);
          setAlerted(inv.id,"tomorrow",today);
        }
      }
    });
  }
  useEffect(()=>{if(dataLoaded&&invoices.length>0)checkDuePayments();},[dataLoaded,invoices.length]);
  // Also check every 5 minutes while app is open
  useEffect(()=>{
    if(!dataLoaded)return;
    const interval=setInterval(checkDuePayments, 5*60*1000);
    return()=>clearInterval(interval);
  },[dataLoaded,invoices,vendors]);
  const draftCount=invoices.filter(i=>i.status==="Draft").length;
  const unreadNotif=notifs.filter(n=>!n.read).length;

  const isAdmin=isSuperAdmin(user?.email)||user?.role==="Admin";
  const nav=[
    {id:"dashboard",label:"Dashboard",    icon:"dashboard",section:"Main"},
    {id:"vendors",  label:"Vendors",      icon:"vendor",   section:"Operations"},
    {id:"stock",    label:"Stock",        icon:"stock",    section:"Operations",badge:lowCount||null},
    {id:"invoices", label:"Invoices",     icon:"invoice",  section:"Operations",badge:draftCount||null},
    {id:"po",       label:"Purchase Orders",icon:"po",     section:"Operations"},
    ...(isAdmin?[{id:"expenses",label:"Expenses",icon:"expense",section:"Finance"},{id:"reminders",label:"Pay Reminders",icon:"bell",section:"Finance"}]:[{id:"reminders",label:"Pay Reminders",icon:"bell",section:"Finance"}]),
    {id:"reports",  label:"Reports",      icon:"report",   section:"Finance"},
    ...(isAdmin?[
      {id:"users",    label:"Users",        icon:"users",    section:"System"},
      {id:"audit",    label:"Audit Trail",  icon:"audit",    section:"System"},
      {id:"settings", label:"Settings",     icon:"settings", section:"System"},
    ]:[]),
    ...(isSuperAdmin(user?.email)?[
      {id:"adminpanel",label:"Admin Panel",  icon:"shield",   section:"Admin"},
      {id:"hrms",      label:"HR Management",icon:"users",    section:"Admin"},
    ]:[]),
  ];
  // Filter nav by user permissions
  const permittedNav=(isSuperAdmin(user?.email)||user?.role==="Admin")?nav:nav.filter(n=>{
    if(["adminpanel","hrms"].includes(n.id))return false;
    if(!user?.permissions)return!["users","audit","settings","expenses"].includes(n.id);
    return user.permissions[n.id]===true;
  });
  const sections=[...new Set(permittedNav.map(n=>n.section))];
  const pageTitle=nav.find(n=>n.id===page)?.label||"Dashboard";

  // Keyboard shortcut: Ctrl+K = search
  useEffect(()=>{
    const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  if(!user)return(
    <>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:#0f172a;color:#e2e8f0}@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}`}</style>
      <AuthPage onLogin={u=>{
        setUser(u);
        try{localStorage.setItem("st_user",JSON.stringify(u));}catch(e){}
        add(`Welcome, ${u.name}!`,"success");
        addNotif("success","Login","Welcome back, "+(u.name||u.email)+"!");
        // Log IP
        fetch("https://api.ipify.org?format=json").then(r=>r.json()).then(d=>{
          addAudit("Login","Auth","Logged in — IP: "+(d.ip||"unknown")+" — "+new Date().toLocaleString());
        }).catch(()=>{addAudit("Login","Auth","Logged in — "+new Date().toLocaleString());});
      }} appUsers={users} setAppUsers={setUsers}/>
      <Toasts toasts={toasts} rm={rm}/>
    </>
  );

  return(
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Inter,sans-serif;background:#0f172a;color:#e2e8f0}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#1e293b}
        ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:#475569}
        @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:768px){
          .sb{transform:translateX(-260px)!important}
          .sb.open{transform:translateX(0)!important;box-shadow:0 0 40px rgba(0,0,0,.6)}
          .mc{margin-left:0!important}
          .sh{display:none!important}
        }
      `}</style>

      <div style={{minHeight:"100vh",position:"relative"}}>
        {/* ── SIDEBAR ── */}
        <div className={`sb${sidebarOpen?" open":""}`} style={{background:"#070d1a",borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",overflow:"hidden",paddingTop:"env(safe-area-inset-top)"}}>
          <div style={{padding:"20px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:12}}>
            <SilkyLogo size={44} sidebar={true}/>
            <div><div style={{fontWeight:800,fontSize:14,color:T.text,lineHeight:1.2}}>{BRAND}</div><div style={{fontSize:10,color:"#374151",marginTop:2}}>Stock & Invoice System</div></div>
          </div>

          <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:"8px 0 80px 0",WebkitOverflowScrolling:"touch",paddingBottom:"calc(80px + env(safe-area-inset-bottom))"}}>
            {sections.map(sec=>(
              <div key={sec}>
                <div style={{padding:"10px 18px 3px",fontSize:10,fontWeight:700,color:"#283855",textTransform:"uppercase",letterSpacing:".08em"}}>{sec}</div>
                {permittedNav.filter(n=>n.section===sec).map(item=>(
                  <div key={item.id} onClick={()=>{setPage(item.id);setSidebarOpen(false);}}
                    style={{display:"flex",alignItems:"center",gap:11,padding:"10px 18px",cursor:"pointer",color:page===item.id?"#60a5fa":"#4b6180",background:page===item.id?"linear-gradient(90deg,rgba(59,130,246,.12),transparent)":"transparent",borderLeft:page===item.id?"3px solid #3b82f6":"3px solid transparent",fontSize:13.5,fontWeight:page===item.id?600:500,transition:"all .15s"}}
                    onMouseEnter={e=>{if(page!==item.id){e.currentTarget.style.background="rgba(255,255,255,.03)";e.currentTarget.style.color="#8bafd4";}}}
                    onMouseLeave={e=>{if(page!==item.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#4b6180";}}}>
                    <Icon n={item.icon} size={17}/>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge&&<span style={{background:"#ef4444",color:"white",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,lineHeight:1.4}}>{item.badge}</span>}
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* ── User info row ── */}
          <div style={{padding:"12px 18px",borderTop:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"white",flexShrink:0}}>
              {user.picture
                ? <img src={user.picture} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover"}} referrerPolicy="no-referrer"/>
                : (user.avatar||"U")}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
              <div style={{fontSize:11,color:T.muted}}>{user.role||"User"}</div>
            </div>
          </div>
          {/* ── Logout button ── */}
          <div onClick={()=>{
  if(window.confirm("Are you sure you want to logout?")){
    addAudit&&addAudit("Logout","Auth","User logged out");
    setUser(null);setPage("dashboard");
    try{localStorage.removeItem("st_user");}catch(e){}
    add("Logged out","info");
  }
}}
            style={{margin:"0 12px 14px",padding:"10px 14px",borderRadius:9,
              background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",
              display:"flex",alignItems:"center",gap:10,cursor:"pointer",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(239,68,68,0.18)";e.currentTarget.style.borderColor="rgba(239,68,68,0.4)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(239,68,68,0.08)";e.currentTarget.style.borderColor="rgba(239,68,68,0.2)";}}>
            <Icon n="logout" size={16} color="#ef4444"/>
            <span style={{fontSize:13,fontWeight:600,color:"#ef4444"}}>Sign Out</span>
          </div>
        </div>

        {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:499}}/>}

        {/* ── MAIN ── */}
        <div className="mc">
          {/* Topbar */}
          <div style={{background:"#080e1a",borderBottom:`1px solid ${T.border}`,minHeight:60,display:"flex",alignItems:"center",padding:"0 16px",paddingTop:"max(0px, env(safe-area-inset-top))",gap:10,position:"sticky",top:0,zIndex:50,boxSizing:"border-box"}}>
            <button onClick={()=>setSidebarOpen(s=>!s)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,width:36,height:36,cursor:"pointer",color:T.dim,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon n="menu" size={17}/>
            </button>
            <div style={{flex:1,fontSize:17,fontWeight:800,color:T.text}}>{pageTitle}</div>

            {/* Search bar */}
            <div className="sh" onClick={()=>setShowSearch(true)} style={{display:"flex",alignItems:"center",gap:9,background:"#0b1525",border:`1px solid ${T.border}`,borderRadius:9,padding:"7px 14px",cursor:"pointer",minWidth:220}}>
              <Icon n="search" size={15} color={T.muted}/>
              <span style={{fontSize:13,color:T.muted,flex:1}}>Search…</span>
              <kbd style={{background:"#1e293b",color:"#475569",borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:600}}>⌘K</kbd>
            </div>

            {/* Notifications */}
            <div style={{position:"relative"}}>
              <button id="pwa-install-btn" onClick={()=>window.__triggerInstall&&window.__triggerInstall()} style={{display:"none",background:"linear-gradient(135deg,#1e3a8a,#2563eb)",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"white",fontSize:11,fontWeight:700,alignItems:"center",gap:5,marginRight:4}}>
                <span>📲</span><span>Install App</span>
              </button>
              <button onClick={()=>setShowNotif(s=>!s)} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,width:36,height:36,cursor:"pointer",color:T.dim,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                <Icon n="bell" size={17}/>
                {unreadNotif>0&&<span style={{position:"absolute",top:6,right:6,width:8,height:8,background:"#ef4444",borderRadius:"50%"}}/>}
              </button>
              {showNotif&&<>
              <div onClick={()=>setShowNotif(false)} style={{position:"fixed",inset:0,zIndex:198}}/>
              <NotifPanel notifs={notifs} setNotifs={setNotifs} onClose={()=>setShowNotif(false)} addNotif={addNotif}/>
            </>}
            </div>

            <div onClick={()=>setPage("settings")} style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"white",cursor:"pointer",flexShrink:0,overflow:"hidden"}}>
              {user.picture
                ?<img src={user.picture} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover"}} referrerPolicy="no-referrer"/>
                :(user.avatar||"U")}
            </div>
          </div>

          {/* Page content */}
          <div style={{flex:1,overflowY:"auto"}}>
            {page==="dashboard"&&<Dashboard stock={stock} invoices={invoices} vendors={vendors} pos={pos} navigate={setPage}/>}
            {page==="vendors"  &&<Vendors   vendors={vendors} setVendors={setVendors} addToast={add} addAudit={addAudit} user={user} invoices={invoices} addNotif={addNotif}/>}
            {page==="stock"    &&<Stock     stock={stock} setStock={setStock} vendors={vendors} movements={movements} setMovements={setMovements} addToast={add} addAudit={addAudit} user={user}/>}
            {page==="invoices" &&<Invoices  invoices={invoices} setInvoices={setInvoices} vendors={vendors} stock={stock} setStock={setStock} user={user} addToast={add} addAudit={addAudit} bizInfo={bizInfo} addNotif={addNotif}/>}
            {page==="po"       &&<PurchaseOrders pos={pos} setPos={setPos} vendors={vendors} stock={stock} user={user} addToast={add} addAudit={addAudit} bizInfo={bizInfo} addNotif={addNotif}/>}
            {page==="expenses" &&<Expenses  expenses={expenses} setExpenses={setExpenses} addToast={add} addAudit={addAudit} user={user}/>}
            {page==="reports"  &&<Reports   invoices={invoices} stock={stock} vendors={vendors} expenses={expenses} users={users} audit={audit} addToast={add}/>}
            {page==="users"    &&<Users     currentUser={user} users={users} setUsers={setUsers} addToast={add} addAudit={addAudit} addNotif={addNotif} employees={employees}/>}
            {page==="audit"    &&<AuditTrail audit={audit||[]} setAudit={setAudit} addToast={add} user={user}/>}
            {page==="settings" &&<Settings  user={user} addToast={add} bizInfo={bizInfo} setBizInfo={setBizInfo} setVendors={setVendors} setStock={setStock} setInvoices={setInvoices} setPos={setPos} setMovements={setMovements} setExpenses={setExpenses} setUsers={setUsers}/>}
            {page==="reminders"&&<PaymentReminders invoices={invoices} vendors={vendors} addNotif={addNotif} addToast={add}/>}
            {page==="adminpanel"&&isSuperAdmin(user?.email)&&<AdminPanel user={user} users={users} setUsers={setUsers} audit={audit} setAudit={setAudit} invoices={invoices} expenses={expenses} stock={stock} vendors={vendors} addToast={add}/>}
            {page==="hrms"&&(isSuperAdmin(user?.email)||user?.role==="Admin")&&<HRMS user={user} employees={employees} setEmployees={setEmployees} addToast={add} addAudit={addAudit} addNotif={addNotif} invoices={invoices} vendors={vendors}/>}
          </div>
        </div>
      </div>

      {/* Global Search Overlay */}
      {showSearch&&<GlobalSearch stock={stock} invoices={invoices} vendors={vendors} onClose={()=>setShowSearch(false)} navigate={p=>{setPage(p);setShowSearch(false);}}/>}

      <Toasts toasts={toasts} rm={rm}/>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App, null));
    // Hide splash
    setTimeout(function(){
      var s=document.getElementById("splash");
      if(s){s.style.opacity="0";setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s)},600)}
    },2500);

    try {
      prog(95);
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App/>);
      prog(100);
      setTimeout(function(){
        var s=document.getElementById("splash");
        if(s){s.style.opacity="0";setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},500);}
      },800);
    } catch(e) {
      showErr("App error: " + e.message);
    }
  </script>
</body>
</html
