                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",color:"#64748b"}}>{i+1}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",fontWeight:600,color:"#111"}}>{item.name}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",color:"#374151"}}>{item.carton||"—"}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",color:"#374151"}}>{item.pcs||"—"}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",fontWeight:600}}>{item.qty||0}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",color:"#374151"}}>{fmtCur(item.price||0)}</td>
                <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",fontWeight:700,color:"#1e3a8a"}}>{fmtCur(item.total||0)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Totals */}
      <div style={{margin:"12px 8px",display:"flex",justifyContent:"flex-end"}}>
        <div style={{width:"100%",maxWidth:"min(280px,100%)"}}>
          {[
            ["Subtotal",fmtCur(inv.subtotal||0)],
            ["Tax ("+(inv.tax||0)+"%)",fmtCur((inv.subtotal||0)*(inv.tax||0)/100)],
            ...(inv.discount&&parseFloat(inv.discount)>0?[["Discount","-"+fmtCur(inv.discount)]]:[]),
            ...(inv.freight&&parseFloat(inv.freight)>0?[["Freight",fmtCur(inv.freight)]]:[]),
            ...(inv.paidAmount&&parseFloat(inv.paidAmount)>0?[["Paid","-"+fmtCur(inv.paidAmount)]]:[]),
            ...(inv.paymentTerms?[["Terms",inv.paymentTerms==="Credit Base"&&inv.date&&inv.dueDate?(()=>{try{const d=Math.round((new Date(inv.dueDate)-new Date(inv.date))/(864e5));return"Credit Base ("+d+" Days Left)";}catch(e){return inv.paymentTerms;}})():inv.paymentTerms]]:[]),
          ].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #e2e8f0",fontSize:"clamp(10px,2.5vw,12px)"}}>
              <span style={{color:"#64748b"}}>{k}</span>
              <span style={{fontWeight:600}}>{v}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 4px",fontSize:"clamp(13px,3.5vw,16px)",fontWeight:900,color:"#1e3a8a",borderTop:"2px solid #1e3a8a",marginTop:4}}>
            <span>BALANCE DUE</span><span>{fmtCur(inv.total||0)}</span>
          </div>
        </div>
      </div>

      {/* Notes */}
      {inv.notes&&<div style={{margin:"0 8px 12px",padding:"8px 12px",background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,fontSize:"clamp(10px,2.5vw,11px)",color:"#92400e"}}>
        <strong>Notes:</strong> {inv.notes}
      </div>}

      {/* Footer */}
      <div style={{margin:"12px 8px 0",paddingTop:10,borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
        <div style={{fontSize:"clamp(8px,2vw,10px)",color:"#94a3b8"}}>Thank you for your business with Silky Touch.{bizInfo?.ntn?" · NTN: "+bizInfo.ntn:""}</div>
        <div style={{fontSize:"clamp(8px,2vw,10px)",color:"#94a3b8"}}>Developed By Mehar Enterprises Limited.</div>
      </div>
      <div style={{height:6,background:"linear-gradient(135deg,#1e3a8a,#2563eb)",marginTop:10}}/>
    </div>
  );
}


function Invoices({invoices,setInvoices,vendors,stock,setStock,user,addToast,addAudit,bizInfo=INIT_BIZ,addNotif=()=>{}}){
  const [modal,setModal]=useState(null);const [viewInv,setViewInv]=useState(null);const [f,setF]=useState({});
  const [q,setQ]=useState("");const [statusF,setStatusF]=useState("All");const [vendorF,setVendorF]=useState("All");
  const [paymentF,setPaymentF]=useState("All");
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const list=invoices.filter(inv=>{
    const m=inv.invoiceNo.toLowerCase().includes(q.toLowerCase())||inv.vendorName.toLowerCase().includes(q.toLowerCase());
    const s=statusF==="All"||inv.status===statusF;
    const v=vendorF==="All"||String(inv.vendorId)===String(vendorF);
    const p=paymentF==="All"||(paymentF==="Paid"?inv.paymentStatus==="Received":inv.paymentStatus!=="Received");
    return m&&s&&v&&p;
  });
  const nextNo=padInv(invoices.length+1);
  const openCreate=()=>{
    if(vendors.length===0){addToast("Please add a Vendor first before creating an invoice.","warning");return;}
    const s0=stock[0]||null;
    setF({invoiceNo:nextNo,vendorId:vendors[0]?.id||"",date:todayStr(),dueDate:"",status:"Posted",
      items:[],
      subtotal:0,tax:"",discount:"",freight:"",paidAmount:"",paymentTerms:"Cash Only",
      total:0,notes:""});
    setModal("create");
  };
  const updItem=(rowIdx,key,val)=>{
    setF(prev=>{
      const items=prev.items.map((it,i)=>({...it}));
      if(key==="carton"||key==="pcs"){
        items[rowIdx]={...items[rowIdx],[key]:val};
        const c=parseFloat(key==="carton"?val:items[rowIdx].carton)||0;
        const p=parseFloat(key==="pcs"?val:items[rowIdx].pcs)||0;
        if(c>0&&p>0){
          items[rowIdx].qty=c*p;
          const price=parseFloat(items[rowIdx].price)||0;
          items[rowIdx].total=(c*p)*price;
        }
        const sub=items.reduce((s,it)=>s+(parseFloat(it.total)||0),0);
        const tax=prev.tax||0;
        const freight=parseFloat(prev.freight)||0;
        const paid=parseFloat(prev.paidAmount)||0;
        const balance=sub+sub*(tax/100)+freight-paid;
        return{...prev,items,subtotal:sub,total:Math.max(0,balance)};
      }
      if(key==="stockId"){
        const newId=String(val);
        if(newId&&items.some((it,i)=>i!==rowIdx&&String(it.stockId)===newId)){
          addToast("This item is already added! Increase quantity instead.","warning");
          return prev;
        }
        const s=stock.find(x=>String(x.id)===newId);
        items[rowIdx]={...items[rowIdx],stockId:newId,
          name:s?s.name:"",price:s?s.buyPrice:0,
          availableQty:s?s.qty:0,unit:s?s.unit:"",
          total:0,qty:""};
      } else if(key==="qty"){
        if(val===""||val===null){items[rowIdx]={...items[rowIdx],qty:"",total:0};const sub2=items.reduce((s,it)=>s+(parseFloat(it.total)||0),0);return{...prev,items,subtotal:sub2,total:Math.max(0,sub2+sub2*((prev.tax||0)/100)-(prev.discount||0))};}
        const q=parseFloat(val)||0;
        const avail=parseFloat(items[rowIdx].availableQty)||9999;
        if(q>avail){
          addToast("Insufficient stock! Available: "+avail+" "+items[rowIdx].unit+" of "+items[rowIdx].name,"warning");
          return prev;
        }
        items[rowIdx]={...items[rowIdx],qty:q,total:q*(parseFloat(items[rowIdx].price)||0)};
      } else {
        items[rowIdx]={...items[rowIdx],[key]:val};
        if(key==="price"){
          const p=parseFloat(val)||0;
          items[rowIdx]={...items[rowIdx],total:(parseFloat(items[rowIdx].qty)||0)*p};
        }
      }
      const sub=items.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
      return{...prev,items,subtotal:sub,total:sub+sub*((prev.tax||0)/100)-(prev.discount||0)};
    });
  };
  const addLine=()=>{setF(p=>({...p,items:[...p.items,{stockId:"",name:"",qty:null,price:"",total:0,unit:"",availableQty:0,_key:Date.now()+Math.random()}]}));};
  const remLine=idx=>{const items=f.items.filter((_,i)=>i!==idx);const sub=items.reduce((s,i)=>s+i.total,0);setF(p=>({...p,items,subtotal:sub,total:sub+sub*(p.tax/100)-p.discount}));};
  const recalc=(tax,disc,freight,paid)=>{const sub=f.items.reduce((s,i)=>s+(parseFloat(i.total)||0),0);const fr=parseFloat(freight!==undefined?freight:f.freight)||0;const pa=parseFloat(paid!==undefined?paid:f.paidAmount)||0;const disc2=parseFloat(disc)||0;const balance=sub+sub*((parseFloat(tax)||0)/100)-disc2+fr-pa;setF(p=>({...p,tax,discount:disc,subtotal:sub,freight:fr,paidAmount:pa,total:Math.max(0,balance)}));};
  const save=()=>{
    if(!f.items||f.items.length===0){addToast("Add at least one line item","error");return;}
    const dupItem=f.items.find((it,i)=>f.items.findIndex(x=>String(x.stockId)===String(it.stockId))!==i);
    if(dupItem){addToast("Duplicate product: "+dupItem.name,"warning");return;}
    if(!validateStock(f.items)){return;}
    const vdr=f.vendorId==="__other__"?{name:f.customVendor||"Other"}:vendors.find(v=>String(v.id)===String(f.vendorId));
    const inv={...f,vendorId:parseInt(f.vendorId),vendorName:vdr?.name||"",vendorContact:vdr?.contact||"",createdBy:user.name,createdAt:f.createdAt||todayStr()};
    const newId=uid();
    if(modal==="create"){
      setInvoices(p=>[...p,{...inv,id:newId}]);
      // Auto deduct stock if Posted
      if(inv.status==="Posted"){
        setStock(prev=>prev.map(s=>{
          const item=inv.items.find(it=>String(it.stockId)===String(s.id));
          if(!item) return s;
          const newQty=Math.max(0,(parseFloat(s.qty)||0)-(parseFloat(item.qty)||0));
          return{...s,qty:newQty};
        }));
      }
      addAudit("Create Invoice","Invoice",`Created ${inv.invoiceNo}`);
    } else {
      const oldInv=invoices.find(i=>i.id===inv.id);
      setInvoices(p=>p.map(i=>i.id===inv.id?inv:i));
      // If status changed to Posted, deduct stock
      if(inv.status==="Posted"&&oldInv?.status!=="Posted"){
        setStock(prev=>prev.map(s=>{
          const item=inv.items.find(it=>String(it.stockId)===String(s.id));
          if(!item) return s;
          const newQty=Math.max(0,(parseFloat(s.qty)||0)-(parseFloat(item.qty)||0));
          return{...s,qty:newQty};
        }));
      }
      addAudit("Edit Invoice","Invoice",`Edited ${inv.invoiceNo}`);
    }
    addToast(`Invoice ${modal==="create"?"created":"updated"}!`,"success");setModal(null);
  };
  const validateStock=(items)=>{
    for(const item of items){
      if(!item.stockId||!item.name)continue;
      const s=stock.find(x=>String(x.id)===String(item.stockId));
      if(s&&(parseFloat(item.qty)||0)>(parseFloat(s.qty)||0)){
        addToast("Insufficient stock for: "+item.name+" (available: "+s.qty+" "+s.unit+")","warning");
        return false;
      }
    }
    return true;
  };
  const returnInv=(inv)=>{
    if(inv.status!=="Posted"){addToast("Only posted invoices can be returned","warning");return;}
    if(!window.confirm("Return "+inv.invoiceNo+"? Stock will be restored.")){return;}
    setInvoices(p=>p.map(i=>i.id===inv.id?{...i,status:"Returned"}:i));
    (inv.items||[]).forEach(item=>{
      const qty=parseInt(item.qty)||0;
      setStock(p=>p.map(s=>String(s.id)===String(item.stockId)?{...s,qty:(parseInt(s.qty)||0)+qty}:s));
    });
    addAudit("Return Invoice","Invoice","Returned "+inv.invoiceNo);
    addToast(inv.invoiceNo+" returned.","success");addNotif("warning","Invoice Returned",inv.invoiceNo+" returned. Stock restored.");
  };
  const togglePost=inv=>{
    if(inv.status!=="Posted"&&!validateStock(inv.items)){return;}
    const ns=inv.status==="Posted"?"Draft":"Posted";
    setInvoices(p=>p.map(i=>i.id===inv.id?{...i,status:ns}:i));
    // Auto-deduct stock when posting, restore when unposting
    if(ns==="Posted"){
      inv.items.forEach(item=>{
        setStock(p=>p.map(s=>s.id===item.stockId?{...s,qty:Math.max(0,s.qty-item.qty)}:s));
      });
      addToast(`Invoice posted! Stock updated.`,"success");addNotif&&addNotif("success","Invoice Posted","Invoice "+inv.invoiceNo+" posted.");
    } else {
      inv.items.forEach(item=>{
        setStock(p=>p.map(s=>s.id===item.stockId?{...s,qty:s.qty+item.qty}:s));
      });
      addToast(`Invoice moved to draft. Stock restored.`,"info");
    }
    addAudit(`${ns==="Posted"?"Post":"Unpost"} Invoice`,"Invoice",`${ns} ${inv.invoiceNo}`);
  };
  const del=inv=>{if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("You are not authorized to delete invoices.","warning");return;}if(!window.confirm("Are you sure to delete Invoice entry: "+inv.invoiceNo+"?")){return;}setInvoices(p=>p.filter(i=>i.id!==inv.id));addAudit("Delete Invoice","Invoice",`Deleted ${inv.invoiceNo}`);addToast("Invoice deleted","info");};
  const doExport=()=>{exportCSV("invoices.csv",["Invoice No","Vendor","Date","Due","Status","Subtotal","Tax%","Discount","Total"],invoices.map(i=>[i.invoiceNo,i.vendorName,i.date,i.dueDate,i.status,i.subtotal,i.tax,i.discount,i.total]));addToast("Exported invoices.csv","success");};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Invoice Management</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>{invoices.length} invoices · Next: <span style={{fontFamily:"monospace",color:"#60a5fa"}}>{nextNo}</span></p></div>
        <div style={{display:"flex",gap:10}}><Btn v="outline" size="sm" onClick={doExport}><Icon n="csv" size={14}/>Export CSV</Btn><Btn onClick={openCreate}><Icon n="plus" size={15}/>New Invoice</Btn></div>
      </div>
      <Card>
        <CardH title={`${list.length} invoices`} right={
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <SearchBox value={q} onChange={setQ} placeholder="Invoice no, vendor..."/>
            <Sel value={statusF} onChange={e=>setStatusF(e.target.value)} style={{width:"auto",padding:"7px 12px"}}><option value="All">All Status</option><option>Draft</option><option>Posted</option></Sel>
            <Sel value={vendorF} onChange={e=>setVendorF(e.target.value)} style={{width:"auto",padding:"7px 12px"}}><option value="All">All Vendors</option>{vendors.map(v=><option key={v.id} value={String(v.id)}>{v.name}</option>)}</Sel>
          <Sel value={paymentF} onChange={e=>setPaymentF(e.target.value)} style={{width:"auto",padding:"7px 12px"}}><option value="All">All Payments</option><option value="Paid">✅ Paid</option><option value="Pending">💰 Pending</option></Sel>
          </div>
        }/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Invoice"/><TH c="Vendor"/><TH c="Date"/><TH c="Due"/><TH c="Items"/><TH c="Amount"/><TH c="Status"/><TH c="Actions"/></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={5}><div style={{padding:40,textAlign:"center",color:"#475569"}}><Icon n="invoice" size={36} color="#334155"/><p style={{marginTop:10}}>No invoices found</p></div></td></tr>}
              {list.map(inv=>(
                <TR key={inv.id}>
                  <TD style={{color:"#60a5fa",fontWeight:700,fontFamily:"monospace"}}>{inv.invoiceNo}</TD>
                  <TD>{inv.vendorName}</TD>
                  <TD>{fmtDate(inv.date)}</TD>
                  <TD style={{color:inv.dueDate&&new Date(inv.dueDate)<new Date()&&inv.status==="Draft"?"#ef4444":"inherit"}}>{fmtDate(inv.dueDate)}</TD>
                  <TD style={{textAlign:"center"}}>{inv.items.length}</TD>
                  <TD style={{fontWeight:700}}>{fmtCur(inv.total)}</TD>
                  <TD><Badge v={inv.status==="Posted"?"success":"warning"} dot>{inv.status}</Badge></TD>
                  <TD>
                    <div style={{display:"flex",gap:5}}>
                      
                      <Btn v={inv.status==="Posted"?"warning":"success"} size="xs" onClick={()=>togglePost(inv)}>{inv.status==="Posted"?"Unpost":"Post"}</Btn>

                        const newStatus=inv.paymentStatus==="Received"?"Pending":"Received";
                        setInvoices(p=>p.map(i=>i.id===inv.id?{...i,paymentStatus:newStatus}:i));
                        if(newStatus==="Received"){
                          addToast("✅ Payment marked as Received for "+inv.invoiceNo,"success");
                          addNotif("success","✅ Payment Received: "+inv.invoiceNo,"Payment cleared — no reminder will be sent to vendor.");
                        }
                      }}>{inv.paymentStatus==="Received"?"✅ Paid":"💰 Pending"}</Btn>
                      <Btn v="outline" size="xs" onClick={()=>{setF({...inv,items:inv.items.map(i=>({...i}))});setModal("edit");}}><Icon n="edit" size={11}/></Btn>
                      <Btn v="outline" size="xs" onClick={()=>{setViewInv(inv);setTimeout(()=>{const pa=document.getElementById("inv-print-area");if(pa){const w=window.open("","_blank","width=800,height=600");if(!w){alert("Please allow popups for this app to print/download.");return;}w.document.write("<!DOCTYPE html><html><head><title>"+inv.invoiceNo+"</title><style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;}body{font-family:Inter,Arial,sans-serif;background:white;margin:0;}@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}@page{size:A4 portrait;margin:8mm;}}</style></head><body>"+pa.innerHTML+"<\/body><\/html>");w.document.close();w.focus();setTimeout(()=>{w.print();},600);}},300);}}><Icon n="download" size={11}/></Btn>
                      
                      <Btn v="danger" size="xs" onClick={()=>del(inv)}><Icon n="trash" size={11}/></Btn>
                    </div>
                  </TD>
                </TR>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Create/Edit */}
      <Modal open={!!modal} onClose={()=>setModal(null)} title={`${modal==="create"?"Create":"Edit"} Invoice`} subtitle={f.invoiceNo} size="xl"
        footer={<><Btn v="outline" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save}><Icon n="check" size={14}/>Save Invoice</Btn></>}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
          <FG label="Invoice No"><Inp value={f.invoiceNo||""} readOnly style={{opacity:.6}}/></FG>
          <FG label="Vendor *"><Sel value={f.vendorId||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,vendorId:v,customVendor:v==="__other__"?p.customVendor||"":""}));}}>
                {vendors.map(v=><option key={v.id} value={String(v.id)}>{v.name}</option>)}
                <option value="__other__">-- Other (Type manually) --</option>
              </Sel>
              {f.vendorId==="__other__"&&<Inp value={f.customVendor||""} onChange={e=>setF(p=>({...p,customVendor:e.target.value}))} placeholder="Enter vendor name" style={{marginTop:6}}/>}</FG>
          <FG label="Status"><Sel value={f.status||"Draft"} onChange={up("status")}><option>Draft</option><option>Posted</option></Sel></FG>
          <FG label="Invoice Date"><Inp type="date" value={f.date||new Date().toISOString().split("T")[0]} onChange={up("date")}/></FG>
          <FG label="Due Date"><Inp type="date" value={f.dueDate||""} onChange={up("dueDate")}/></FG>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,color:T.text,fontSize:14}}>Line Items</div>
            <Btn v="outline" size="sm" onClick={addLine}><Icon n="plus" size={13}/>Add Line</Btn>
          </div>
          <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr><TH c="Product"/><TH c="Ctn"/><TH c="PCS"/><TH c="Qty"/><TH c="Price"/><TH c="Total"/><TH c=""/></tr></thead>
              <tbody>{(f.items||[]).map((item,idx)=>(
                <tr key={item._key||idx}>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}>
                    <Sel value={String(item.stockId||"")} onChange={e=>updItem(idx,"stockId",e.target.value)} style={{minWidth:180,padding:"7px 10px",width:"100%"}}>
                      <option value="">-- Select Product --</option>
                      {stock.map(s=><option key={s.id} value={String(s.id)}>{s.name}</option>)}
                    </Sel>
                    {item.stockId&&<div style={{fontSize:10,color:"#10b981",marginTop:2}}>Available: {(stock.find(s=>String(s.id)===String(item.stockId))||{qty:0}).qty} {item.unit}</div>}
                  </td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid #162032"}}>
                    <Inp type="number" value={item.carton===undefined||item.carton===null||item.carton===""?"":item.carton} onChange={e=>{updItem(idx,"carton",e.target.value===""?"":e.target.value);}} style={{width:60,padding:"5px 6px"}} placeholder="" onClick={e=>e.target.select()}/>
                  </td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid #162032"}}>
                    <Inp type="number" value={item.pcs===undefined||item.pcs===null||item.pcs===""?"":item.pcs} onChange={e=>{updItem(idx,"pcs",e.target.value===""?"":e.target.value);}} style={{width:60,padding:"5px 6px"}} placeholder="" onClick={e=>e.target.select()}/>
                  </td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid #162032"}}>
                    <Inp type="number" value={item.qty===null||item.qty===undefined||item.qty===""?"":item.qty} onChange={e=>updItem(idx,"qty",e.target.value)} style={{width:60,padding:"5px 6px",background:"rgba(59,130,246,0.1)"}} onClick={e=>e.target.select()}/>
                  </td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}>
                    <Inp type="number" value={item.price===0||item.price===null||item.price===undefined?"":item.price} onChange={e=>{const v=e.target.value===""?"":parseFloat(e.target.value)||0;updItem(idx,"price",v);}} style={{width:90,padding:"5px 8px",color:"#10b981",fontWeight:700}} placeholder="0"/>
                  </td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #162032",fontWeight:700,color:T.text}}>{fmtCur(item.total||0)}</td>
                  <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}>
                    <button onClick={()=>remLine(idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#ef4444"}}><Icon n="trash" size={14}/></button>
                  </td>

              ))}</tbody>
            </table>
          </div>
        </div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}><FG label="Notes"><Txt value={f.notes||""} onChange={up("notes")} placeholder="Payment terms, instructions..."/></FG></div>
          <div style={{width:280,background:"#0b1525",borderRadius:10,padding:18,flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}><span style={{color:T.dim}}>Subtotal</span><span style={{fontWeight:600}}>{fmtCur(f.subtotal)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Tax (%)</span>
              <Inp type="number" value={f.tax===""||f.tax==null?"":f.tax} onChange={e=>{const v=e.target.value;setF(p=>({...p,tax:v}));if(v!==""&&v!==".")recalc(parseFloat(v)||0,parseFloat(f.discount)||0,f.freight,f.paidAmount);}} style={{width:80,textAlign:"right",padding:"5px 9px"}}/>
            </div>
            
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Discount (PKR)</span>
              <Inp type="number" value={f.discount===""||f.discount===null?"":f.discount} onChange={e=>{const v=e.target.value===""?"":e.target.value;setF(p=>({...p,discount:v}));recalc(f.tax||0,parseFloat(v)||0,f.freight||0,f.paidAmount||0);}} style={{width:100,textAlign:"right",padding:"5px 9px"}} placeholder="" onClick={e=>e.target.select()}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Freight Charges</span>
              <Inp type="number" value={f.freight===""||f.freight===null||f.freight===undefined?"":f.freight} onChange={e=>{const v=e.target.value===""?"":e.target.value;setF(p=>({...p,freight:v}));recalc(f.tax||0,f.discount||0,v,f.paidAmount||0);}} style={{width:100,textAlign:"right",padding:"5px 9px"}} placeholder="" onClick={e=>e.target.select()}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Paid Amount</span>
              <Inp type="number" value={f.paidAmount===""||f.paidAmount===null||f.paidAmount===undefined?"":f.paidAmount} onChange={e=>{const v=e.target.value===""?"":e.target.value;setF(p=>({...p,paidAmount:v}));recalc(f.tax||0,f.discount||0,f.freight||0,v);}} style={{width:100,textAlign:"right",padding:"5px 9px"}} placeholder=""/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Payment Terms</span>
              <Sel value={f.paymentTerms||"Cash Only"} onChange={e=>setF(p=>({...p,paymentTerms:e.target.value}))} style={{width:140,padding:"5px 9px",fontSize:12}}>
                <option>Cash Only</option>
                <option>Credit Base</option>
              </Sel>
            </div>
            {f.paymentTerms==="Credit Base"&&f.date&&f.dueDate&&(()=>{try{const d1=new Date(f.date);const d2=new Date(f.dueDate);const days=Math.round((d2-d1)/(1000*60*60*24));return days>0?<div style={{textAlign:"right",fontSize:11,color:"#f59e0b",fontWeight:700}}>⚠️ Credit Base ({days} Days Left)</div>:null;}catch(e){return null;}})()}
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:800}}><span style={{color:"#10b981"}}>BALANCE DUE</span><span style={{color:"#10b981"}}>{fmtCur(f.total)}</span></div>
          </div>
        </div>
      </Modal>

      {/* Preview */}
      {viewInv&&<Modal open onClose={()=>setViewInv(null)} title="Invoice Preview" subtitle={viewInv.invoiceNo} size="lg"
        footer={<div style={{display:"flex",gap:10}}>
          <Btn v="outline" onClick={()=>setViewInv(null)}>Close</Btn>
        </div>}>
        <InvPrint inv={viewInv} vendors={vendors} bizInfo={bizInfo}/>
      </Modal>}
    </div>
  );
}
function PurchaseOrders({pos,setPos,vendors,stock,user,addToast,addAudit,bizInfo=INIT_BIZ,addNotif}){
  const safeNotif=addNotif||(function(){});
  const [modal,setModal]=useState(null);const [f,setF]=useState({});const [viewPO,setViewPO]=useState(null);const [q,setQ]=useState("");
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const list=pos.filter(p=>p.poNo.toLowerCase().includes(q.toLowerCase())||p.vendorName.toLowerCase().includes(q.toLowerCase()));
  const nextNo=padPO(pos.length+1);
  const openCreate=()=>{
    if(vendors.length===0){addToast("Please add a Vendor first before creating a Purchase Order.","warning");return;}
    const s0=stock[0]||null;
    setF({poNo:nextNo,vendorId:vendors[0]?.id||"",date:todayStr(),expectedDate:"",status:"Pending",
      items:s0?[{stockId:s0.id,name:s0.name,qty:1,price:s0.buyPrice,total:s0.buyPrice}]:[],
      subtotal:s0?.buyPrice||0,tax:0,
      total:(s0?.buyPrice||0)*(1+(bizInfo?.taxRate||5)/100),notes:""});
    setModal("create");
  };
  const updItem=(idx,key,val)=>{const items=[...f.items];items[idx]={...items[idx],[key]:val};if(key==="stockId"){
      const dup=items.find((it,i)=>i!==idx&&String(it.stockId)===String(val)&&val!=="");
      if(dup){addToast("Same product already added! Increase quantity instead.","warning");return;}
      const s=stock.find(x=>x.id===parseInt(val));if(s){items[idx]={...items[idx],name:s.name,price:s.buyPrice,total:(items[idx].qty||1)*s.buyPrice};}
    }if(key==="qty"||key==="price"){items[idx]={...items[idx],total:(key==="qty"?parseFloat(val)||0:items[idx].qty)*(key==="price"?parseFloat(val)||0:items[idx].price)};} const sub=items.reduce((s,i)=>s+(i.total||0),0);setF(p=>({...p,items,subtotal:sub,total:sub+sub*((p.tax||0)/100)}));};
  const save=()=>{
    if(f.items&&f.items.length>1){
      const pids=(f.items||[]).map(i=>String(i.stockId)).filter(Boolean);
      if(pids.length!==new Set(pids).size){addToast("Duplicate product in PO! Same item added twice.","warning");return;}
    }
    const vdr=vendors.find(v=>String(v.id)===String(f.vendorId));const po={...f,vendorId:parseInt(f.vendorId),vendorName:vdr?.name||"",createdBy:user.name,createdAt:f.createdAt||todayStr()};if(modal==="create"){setPos(p=>[...p,{...po,id:uid()}]);addNotif("info","PO Created","PO "+po.poNo+" created.");addAudit("Create PO","PO",`Created ${po.poNo}`);}else{setPos(p=>p.map(x=>x.id===po.id?po:x));addAudit("Edit PO","PO",`Edited ${po.poNo}`);}addToast(`PO ${modal==="create"?"created":"updated"}!`,"success");setModal(null);};
  const changeStatus=(po,s)=>{setPos(p=>p.map(x=>x.id===po.id?{...x,status:s}:x));addAudit(`PO ${s}`,"PO",`${po.poNo} → ${s}`);addToast(`PO marked as ${s}`,"success");};
  const del=po=>{if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("Not authorized to delete POs","warning");return;}if(!window.confirm("Are you sure to delete PO entry: "+po.poNo+"?"))return;setPos(p=>p.filter(x=>x.id!==po.id));addAudit("Delete PO","PO",`Deleted ${po.poNo}`);addToast("PO deleted","info");};
  const statusV={Pending:"warning",Received:"success",Cancelled:"danger",Partial:"orange"};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Purchase Orders</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>{pos.length} orders · Next: <span style={{fontFamily:"monospace",color:"#60a5fa"}}>{nextNo}</span></p></div>
        <div style={{display:"flex",gap:8}}>
          <Btn v="outline" onClick={()=>{const cols=["PO No","Vendor","Date","Status","Items","Total"];const rows=(list||[]).map(p=>[p.poNo,p.vendorName||"",p.date||"",p.status||"",(p.items||[]).length,(p.total||0).toFixed(2)]);const csv=[cols,...rows].map(r=>r.map(x=>String(x).replace(/,/g," ")).join(",")).join("\n");const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="purchase-orders.csv";document.body.appendChild(a);a.click();setTimeout(()=>{try{document.body.removeChild(a);}catch(e){}URL.revokeObjectURL(u);},100);addToast("CSV downloaded","success");}}><Icon n="export" size={13}/>CSV</Btn>
          <Btn onClick={openCreate}><Icon n="plus" size={15}/>New PO</Btn>
        </div>
      </div>
      <Card>
        <CardH title={`${list.length} purchase orders`} right={<SearchBox value={q} onChange={setQ} placeholder="PO no, vendor..."/>}/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="PO No"/><TH c="Vendor"/><TH c="Order Date"/><TH c="Expected"/><TH c="Items"/><TH c="Total"/><TH c="Status"/><TH c="Actions"/></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={5}><div style={{padding:40,textAlign:"center",color:"#475569"}}><Icon n="po" size={36} color="#334155"/><p style={{marginTop:10}}>No purchase orders</p></div></td></tr>}
              {list.map(po=>(
                <TR key={po.id}>
                  <TD style={{color:"#a78bfa",fontWeight:700,fontFamily:"monospace"}}>{po.poNo}</TD>
                  <TD>{po.vendorName||(vendors.find(v=>String(v.id)===String(po.vendorId))?.name)||"—"}</TD>
                  <TD>{fmtDate(po.date)}</TD>
                  <TD>{fmtDate(po.expectedDate)}</TD>
                  <TD style={{textAlign:"center"}}>{po.items.length}</TD>
                  <TD style={{fontWeight:700}}>{fmtCur(po.total)}</TD>
                  <TD><Badge v={statusV[po.status]||"gray"} dot>{po.status}</Badge></TD>
                  <TD>
                    <div style={{display:"flex",gap:3,alignItems:"center",flexWrap:"nowrap"}}>
                      <Btn v="outline" size="xs" onClick={()=>setViewPO(po)}><Icon n="eye" size={11}/></Btn>
                      {po.status==="Pending"&&<><Btn v="success" size="xs" onClick={()=>changeStatus(po,"Received")}>Receive</Btn><Btn v="danger" size="xs" onClick={()=>changeStatus(po,"Cancelled")}>Cancel</Btn></>}
                      <Btn v="outline" size="xs" onClick={()=>{setF({...po,items:po.items.map(i=>({...i}))});setModal("edit");}}><Icon n="edit" size={11}/></Btn>
                      <Btn v="outline" size="xs" title="Print/PDF" onClick={()=>{setViewPO(po);setTimeout(()=>{const pa=document.getElementById("po-print-area");if(pa){const w=window.open("","_blank","width=900,height=700");if(!w){alert("Please allow popups for this app to print/download.");return;}w.document.write("<!DOCTYPE html><html><head><title>"+po.poNo+"</title><style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;}body{font-family:Inter,Arial,sans-serif;background:white;margin:0;}@media print{*{-webkit-print-color-adjust:exact!important;}@page{size:A4 portrait;margin:8mm;}}</style></head><body>"+pa.outerHTML+"<\/body><\/html>");w.document.close();w.focus();setTimeout(()=>{w.print();},800);}},400);}}><Icon n="download" size={11}/></Btn>
                      <Btn v="danger" size="xs" onClick={()=>del(po)}><Icon n="trash" size={11}/></Btn>

      <Modal open={!!modal} onClose={()=>setModal(null)} title={`${modal==="create"?"Create":"Edit"} Purchase Order`} subtitle={f.poNo} size="xl"

          <FG label="PO No"><Inp value={f.poNo||""} readOnly style={{opacity:.6}}/></FG>

          <FG label="Status"><Sel value={f.status||"Pending"} onChange={up("status")}><option>Pending</option><option>Received</option><option>Partial</option><option>Cancelled</option></Sel></FG>
          <FG label="Order Date"><Inp type="date" value={f.date||""} onChange={up("date")}/></FG>

        </div>
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,color:T.text,fontSize:14}}>Items to Order</div>
            <Btn v="outline" size="sm" onClick={()=>{if(stock.length===0){addToast("Please add Stock items first.","warning");return;}const s=stock[0];const it={stockId:s.id,name:s.name,qty:1,price:s.buyPrice,total:s.buyPrice};const items=[...f.items,it];const sub=items.reduce((s,i)=>s+i.total,0);setF(p=>({...p,items,subtotal:sub,total:sub+sub*(p.tax/100)}));}}><Icon n="plus" size={13}/>Add Line</Btn>

          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Product"/><TH c="Qty"/><TH c="Buy Price"/><TH c="Total"/><TH c=""/></tr></thead>
            <tbody>{(f.items||[]).map((item,idx)=>(
              <tr key={idx}>
                <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}><Sel value={String(item.stockId||"")} onChange={e=>updItem(idx,"stockId",e.target.value)} style={{minWidth:180,padding:"7px 10px",width:"100%"}}>
                    <option value="">-- Select Product --</option>
                    {stock.map(s=><option key={s.id} value={String(s.id)}>{s.name} (Stock: {s.qty} {s.unit})</option>)}
                  </Sel></td>
                <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}><Inp type="number" min="1" value={item.qty} onChange={e=>updItem(idx,"qty",e.target.value)} style={{width:80,padding:"7px 10px"}}/></td>
                <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}><Inp type="number" value={item.price} onChange={e=>updItem(idx,"price",e.target.value)} style={{width:120,padding:"7px 10px"}}/></td>
                <td style={{padding:"7px 10px",borderBottom:"1px solid #162032",fontWeight:700,color:T.text}}>{fmtCur(item.total)}</td>
                <td style={{padding:"7px 10px",borderBottom:"1px solid #162032"}}><button onClick={()=>{const items=f.items.filter((_,i)=>i!==idx);const sub=items.reduce((s,i)=>s+i.total,0);setF(p=>({...p,items,subtotal:sub,total:sub+sub*(p.tax/100)}));}} style={{background:"none",border:"none",cursor:"pointer",color:"#ef4444"}}><Icon n="trash" size={14}/></button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:180}}><FG label="Notes"><Txt value={f.notes||""} onChange={up("notes")} placeholder="Special instructions..."/></FG></div>
          <div style={{width:260,background:"#0b1525",borderRadius:10,padding:18,flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:13}}><span style={{color:T.dim}}>Subtotal</span><span style={{fontWeight:600}}>{fmtCur(f.subtotal)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:10}}>
              <span style={{color:T.dim,fontSize:13}}>Tax (%)</span>
              <Inp type="number" value={f.tax||0} onChange={e=>{const t=parseFloat(e.target.value)||0;const sub=f.subtotal;setF(p=>({...p,tax:t,total:sub+sub*(t/100)}));}} style={{width:80,textAlign:"right",padding:"5px 9px"}}/>
            </div>
            <div style={{borderTop:`1px solid ${T.border}`,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:800}}><span style={{color:"#a78bfa"}}>TOTAL</span><span style={{color:"#a78bfa"}}>{fmtCur(f.total)}</span></div>
          </div>
        </div>
      </Modal>

      {viewPO&&<Modal open onClose={()=>setViewPO(null)} title="PO Preview" subtitle={viewPO.poNo} size="md"
        footer={<><Btn v="outline" onClick={()=>setViewPO(null)}>Close</Btn><Btn onClick={()=>{const pa=document.getElementById("po-print-area");if(pa){const w=window.open("","_blank","width=900,height=700");if(!w){addToast("Allow popups to print","warning");return;}w.document.write("<!DOCTYPE html><html><head><title>"+(viewPO?.poNo||"PO")+"</title><style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;}body{font-family:Inter,Arial,sans-serif;background:white;margin:0;}@media print{@page{size:A4 portrait;margin:8mm;}}</style></head><body>"+pa.outerHTML+"<\/body><\/html>");w.document.close();w.focus();setTimeout(()=>w.print(),800);}else{addToast("Please wait for preview to load","warning");}}}><Icon n="download" size={14}/>Print/PDF</Btn></>}>
        <div id="po-print-area" style={{background:"white",color:"#111",fontFamily:"Inter,Arial,sans-serif",width:"100%",maxWidth:"100%",boxSizing:"border-box",fontSize:"clamp(11px,3vw,14px)"}}>
          <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",padding:"clamp(10px,3vw,18px)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {(document.getElementById("_li_")||{}).src?<img src={(document.getElementById("_li_")||{}).src} style={{height:"clamp(36px,8vw,52px)",width:"auto",background:"white",borderRadius:5,padding:3}}/>:null}
              <div>
                <div style={{fontSize:"clamp(13px,3.5vw,18px)",fontWeight:900,color:"white"}}>{bizInfo.name||"Silky Touch"}</div>
                {bizInfo.address&&<div style={{fontSize:"clamp(8px,2vw,10px)",color:"rgba(255,255,255,0.8)",marginTop:2}}>{bizInfo.address}</div>}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"clamp(16px,4vw,20px)",fontWeight:900,color:"white"}}>PURCHASE ORDER</div>
              <div style={{fontSize:"clamp(11px,2.5vw,14px)",fontWeight:700,color:"rgba(255,255,255,0.9)",marginTop:3}}>{viewPO.poNo}</div>
              <span style={{background:viewPO.status==="Received"?"#10b981":viewPO.status==="Cancelled"?"#ef4444":"#f59e0b",color:"white",padding:"2px 8px",borderRadius:20,fontSize:"clamp(9px,2vw,11px)",fontWeight:700,marginTop:3,display:"inline-block"}}>{viewPO.status}</span>
            </div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",margin:"10px 8px",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <div style={{flex:"1 1 45%",minWidth:140,padding:"10px 12px",borderRight:"1px solid #e2e8f0"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#3b82f6",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Vendor</div>
              <div style={{fontWeight:700,fontSize:"clamp(12px,3vw,14px)",color:"#111"}}>{viewPO.vendorName||"—"}</div>
            </div>
            <div style={{flex:"1 1 45%",minWidth:140,padding:"10px 12px",background:"#f8fafc"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#3b82f6",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>PO Details</div>
              {[["PO Number",viewPO.poNo],["Date",viewPO.date||"—"],["Expected",viewPO.expectedDate||"—"]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:"clamp(9px,2.5vw,11px)",marginBottom:3}}>
                  <span style={{color:"#64748b"}}>{l}</span><span style={{fontWeight:600,color:"#111"}}>{v}</span>

                    <td style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:"right",fontWeight:700,color:"#1e3a8a"}}>PKR {(parseFloat(item.total)||0).toLocaleString("en-PK")}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{margin:"12px 8px",display:"flex",justifyContent:"flex-end"}}>
            <div style={{width:"100%",maxWidth:"min(260px,100%)"}}>

          <div style={{margin:"12px 8px 0",paddingTop:10,borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,fontSize:"clamp(8px,2vw,10px)",color:"#94a3b8"}}>
            <span>Thank you for your business with Silky Touch.</span>

//  EXPENSES
// ═══════════════════════════════════════════════════════════════
function Expenses({expenses,setExpenses,addToast,addAudit,user}){
  const [modal,setModal]=useState(null);const [f,setF]=useState({});const [q,setQ]=useState("");
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const list=expenses.filter(e=>e.category.toLowerCase().includes(q.toLowerCase())||e.note.toLowerCase().includes(q.toLowerCase()));
  const save=()=>{if(!f.category||!f.amount){addToast("Category & Amount required","error");return;}if(modal==="add"){setExpenses(p=>[...p,{...f,id:uid(),by:user.name,amount:parseFloat(f.amount)}]);addAudit("Add Expense","Finance",`Added ${f.category} PKR${f.amount}`);}else{setExpenses(p=>p.map(e=>e.id===f.id?{...f,amount:parseFloat(f.amount)}:e));}addToast("Expense saved!","success");setModal(null);};
  const del=e=>{setExpenses(p=>p.filter(x=>x.id!==e.id));addAudit("Delete Expense","Finance",`Deleted ${e.category}`);addToast("Expense deleted","info");};
  const doExport=()=>{exportCSV("expenses.csv",["Category","Amount","Date","Note","By"],expenses.map(e=>[e.category,e.amount,e.date,e.note,e.by]));addToast("Exported expenses.csv","success");};
  const cats=["Rent","Utilities","Salaries","Transport","Supplies","Marketing","Maintenance","Other"];
  const byCat=cats.map(c=>({cat:c,total:expenses.filter(e=>e.category===c).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Expenses</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>Total: {fmtCur(total)}</p></div>
        <div style={{display:"flex",gap:10}}><Btn v="outline" size="sm" onClick={doExport}><Icon n="csv" size={14}/>Export</Btn><Btn onClick={()=>{setF({category:"Rent",amount:"",date:todayStr(),note:""});setModal("add");}}><Icon n="plus" size={15}/>Add Expense</Btn></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:20,marginBottom:20}}>
        <Card>
          <CardH title={`${list.length} expenses`} right={<SearchBox value={q} onChange={setQ} placeholder="Category or note..."/>}/>
          <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr><TH c="Category"/><TH c="Amount"/><TH c="Date"/><TH c="Note"/><TH c="By"/><TH c="Actions"/></tr></thead>
              <tbody>
                {list.length===0&&<tr><td colSpan={6}><div style={{padding:40,textAlign:"center",color:"#475569"}}><p>No expenses found</p></div></td></tr>}
                {list.map(e=>(
                  <TR key={e.id}>
                    <TD><Badge v="purple">{e.category}</Badge></TD>
                    <TD style={{fontWeight:700,color:"#ef4444"}}>{fmtCur(e.amount)}</TD>
                    <TD>{fmtDate(e.date)}</TD>
                    <TD style={{fontSize:12,color:T.dim}}>{e.note}</TD>
                    <TD style={{color:T.muted}}>{e.by}</TD>
                    <TD><div style={{display:"flex",gap:5}}><Btn v="outline" size="xs" onClick={()=>{setF({...e});setModal("edit");}}><Icon n="edit" size={11}/></Btn><Btn v="danger" size="xs" onClick={()=>del(e)}><Icon n="trash" size={11}/></Btn></div></TD>
                  </TR>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
        <Card>
          <CardH title="By Category"/>
          <div style={{padding:18}}>
            {byCat.map((x,i)=>{
              const pct=total>0?(x.total/total*100).toFixed(1):0;
              const colors=["#ef4444","#f59e0b","#8b5cf6","#3b82f6","#10b981","#ec4899"];
              return(
                <div key={x.cat} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,fontWeight:600,color:T.text}}>{x.cat}</span><span style={{fontSize:11,color:T.muted}}>{fmtCur(x.total)} ({pct}%)</span></div>
                  <div style={{height:6,background:"#334155",borderRadius:3}}><div style={{height:"100%",width:`${pct}%`,background:colors[i%6],borderRadius:3}}/></div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>
      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal==="add"?"Add Expense":"Edit Expense"} size="sm"
        footer={<><Btn v="outline" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save}>Save</Btn></>}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <FG label="Category"><Sel value={f.category||"Rent"} onChange={up("category")}>{cats.map(c=><option key={c}>{c}</option>)}</Sel></FG>
          <FG label="Amount (PKR)"><Inp type="number" value={f.amount||""} onChange={up("amount")} placeholder="0"/></FG>
          <FG label="Date"><Inp type="date" value={f.date||""} onChange={up("date")}/></FG>
          <FG label="Note"><Inp value={f.note||""} onChange={up("note")} placeholder="Description..."/></FG>
        </div>
      </Modal>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  REPORTS + P&L + PARTNER EQUITY
// ═══════════════════════════════════════════════════════════════
function Reports({invoices,stock,vendors,expenses,users,audit,addToast,bizInfo=INIT_BIZ}){
  const fmtNum=n=>(parseFloat(n)||0).toLocaleString("en-PK",{minimumFractionDigits:0});
  const [tab,setTab]=useState("sales");
  const [dr,setDr]=useState({from:"",to:""});
  const getBiz=()=>{try{const li=document.getElementById("_li_");const biz={...bizInfo};if(li&&li.src)biz.logoUrl=li.src;return biz;}catch(e){return bizInfo;}};
  const pCss="*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}body{font-family:Inter,Arial,sans-serif;background:white;padding:24px;color:#111;}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;}th{background:#1e3a8a;color:white;padding:8px 10px;text-align:left;}td{padding:7px 10px;border-bottom:1px solid #e2e8f0;}tr:nth-child(even){background:#f8fafc;}@media print{@page{size:A4;margin:10mm;}body{padding:12px;}}";
  const op=(title,body)=>{
    const biz=getBiz();
    const logoSrc=biz.logoUrl||"";
    const logoHtml=logoSrc?`<img src="${logoSrc}" style="height:50px;width:auto;border-radius:4px;margin-right:12px"/>`:"";
    const hdr=`<div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;color:white;margin-bottom:20px;border-radius:6px"><div style="display:flex;align-items:center">${logoHtml}<div><div style="font-size:18px;font-weight:900">${biz.name||"Silky Touch"}</div><div style="font-size:10px;opacity:0.8">${biz.address||""}</div></div></div><div style="text-align:right"><div style="font-size:18px;font-weight:900">${title}</div><div style="font-size:11px;opacity:0.8">Generated: ${new Date().toLocaleDateString()}</div></div></div>`;
    const ftr=`<div style="margin-top:40px;border-top:1px solid #e2e8f0;padding:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><div style="font-size:11px;color:#64748b">${biz.footer||"Thank you for your business with Silky Touch."}</div><div style="font-size:10px;color:#94a3b8">Developed By Mehar Enterprises Limited</div></div>`;const html2=`<!DOCTYPE html><html><head><title>${title}</title><style>${pCss}</style></head><body>${hdr}${body}${ftr}</body></html>`;
    const w=window.open("","_blank","width=900,height=700");
    if(!w){addToast("Allow popups to print/download","warning");return;}
    w.document.write(html2);w.document.close();w.focus();
    setTimeout(()=>{w.print();},800);
  };
  const filt=arr=>{
    if(!dr.from&&!dr.to)return arr;
    return arr.filter(r=>{
      let d=r.date||r.invoiceDate||r.createdAt||"";
      if(!d&&r.ts){
        // ts format: "15/05/2026, 09:28:30" → convert to YYYY-MM-DD
        try{const p=r.ts.split(",")[0].trim().split("/");if(p.length===3)d=p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0");}catch(e){}
      }
      return(!dr.from||d>=dr.from)&&(!dr.to||d<=dr.to);
    });
  };
  const fInv=filt((invoices||[]).filter(i=>i.status==="Posted"));
  const fSto=filt(stock||[]);
  const fExp=filt(expenses||[]);
  const fAud=filt(audit||[]);
  const printSales=()=>{
    const rows=fInv.map((inv,i)=>`<tr><td>${i+1}</td><td><b>${inv.invoiceNo}</b></td><td>${inv.vendor||inv.vendorName||"—"}</td><td>${inv.invoiceDate||inv.date||"—"}</td><td>${(inv.items||[]).length}</td><td style="font-weight:700;color:#1e3a8a">PKR ${fmtNum(inv.total||0)}</td></tr>`).join("");
    const tot=fInv.reduce((s,i)=>s+(i.total||0),0);
    op("Sales Report",`<table><thead><tr><th>Sr No</th><th>Invoice No</th><th>Vendor</th><th>Date</th><th>Items</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table><div style="margin-top:16px;text-align:right;font-weight:900;font-size:15px;color:#1e3a8a">TOTAL: PKR ${fmtNum(tot)}</div>`);
  };
  const printStock=()=>{
    const rows=fSto.map((s,i)=>`<tr><td>${i+1}</td><td><b>${s.name}</b></td><td style="font-family:monospace">${s.sku}</td><td>${s.category||"—"}</td><td>${s.qty} ${s.unit}</td><td>PKR ${fmtNum(s.buyPrice||0)}</td><td style="font-weight:700;color:#10b981">PKR ${fmtNum(s.sellPrice||0)}</td><td>${s.location||"—"}</td></tr>`).join("");
    op("Stock Report",`<table><thead><tr><th>Sr No</th><th>Name</th><th>SKU</th><th>Category</th><th>Qty</th><th>Buy Price</th><th>Sell Price</th><th>Location</th></tr></thead><tbody>${rows}</tbody></table>`);
  };
  const printExp=()=>{
    const rows=fExp.map((e,i)=>`<tr><td>${i+1}</td><td>${e.date||e.createdAt||"—"}</td><td><b>${e.category}</b></td><td style="font-weight:700;color:#1e3a8a">PKR ${fmtNum(parseFloat(e.amount)||0)}</td><td>${e.note||e.description||"—"}</td></tr>`).join("");
    const tot=fExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    op("Expenses Report",`<table><thead><tr><th>Sr No</th><th>Date</th><th>Category</th><th>Amount</th><th>Note</th></tr></thead><tbody>${rows}</tbody></table><div style="margin-top:16px;text-align:right;font-weight:900;font-size:15px;color:#1e3a8a">TOTAL: PKR ${fmtNum(tot)}</div>`);
  };
  const printAud=()=>{
    const rows=fAud.map((a,i)=>`<tr><td>${i+1}</td><td style="font-family:monospace;font-size:11px">${a.ts||"—"}</td><td><b>${a.user||"—"}</b></td><td>${a.action||"—"}</td><td>${a.module||"—"}</td><td style="font-size:11px">${a.detail||"—"}</td></tr>`).join("");
    op("Activity Report",`<table><thead><tr><th>Sr No</th><th>Time</th><th>User</th><th>Action</th><th>Module</th><th>Detail</th></tr></thead><tbody>${rows}</tbody></table>`);
  };
  const TABS=[["sales","Sales"],["stock","Stock"],["expenses","Expenses"],["payments","Payments"],["audit","Activity"]];
  const printPayments=()=>{
    const pending=invoices.filter(i=>i.paymentStatus!=="Received"&&i.status==="Posted");
    // Group by vendor
    const byVendor={};
    pending.forEach(inv=>{
      const vName=inv.vendorName||(vendors.find(v=>String(v.id)===String(inv.vendorId))?.name)||"Unknown";
      if(!byVendor[vName]) byVendor[vName]={name:vName,invoices:[],total:0};
      byVendor[vName].invoices.push(inv);
      byVendor[vName].total+=parseFloat(inv.total)||0;
    });
    const totalPending=pending.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
    const rows=Object.values(byVendor).sort((a,b)=>b.total-a.total).map(v=>`
      <tr style="background:#fef3c7"><td colspan="5" style="padding:8px 12px;font-weight:900;color:#92400e;font-size:13px">🏢 ${v.name} — Total Pending: PKR ${fmtNum(v.total)}</td></tr>
      ${v.invoices.map((inv,i)=>`<tr style="background:${i%2===0?"white":"#fafafa"}">
        <td style="padding:7px 12px">${inv.invoiceNo}</td>
        <td style="padding:7px 12px">${inv.date||"—"}</td>
        <td style="padding:7px 12px">${inv.dueDate||"—"}</td>
        <td style="padding:7px 12px;color:${inv.dueDate<new Date().toISOString().slice(0,10)?"#dc2626":"#d97706"};font-weight:700">${inv.dueDate<new Date().toISOString().slice(0,10)?"🚨 OVERDUE":inv.dueDate===new Date().toISOString().slice(0,10)?"💰 DUE TODAY":"⏳ Upcoming"}</td>
        <td style="padding:7px 12px;font-weight:700;color:#1e3a8a;text-align:right">PKR ${fmtNum(inv.total)}</td>
      </tr>`).join("")}
    `).join("");
    op("Pending Payment Report",`
      <div style="background:#fef2f2;border:2px solid #fecaca;border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;color:#991b1b;font-weight:700;text-transform:uppercase">Total Pending Payments</div>
        <div style="font-size:24px;font-weight:900;color:#dc2626">PKR ${fmtNum(totalPending)}</div>
        <div style="font-size:12px;color:#991b1b">${pending.length} unpaid invoice(s) · ${Object.keys(byVendor).length} vendor(s)</div></div>
      </div>
      <table border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:#1e3a8a;color:white">
          <th style="padding:10px 12px;text-align:left">Invoice#</th>
          <th style="padding:10px 12px;text-align:left">Invoice Date</th>
          <th style="padding:10px 12px;text-align:left">Due Date</th>
          <th style="padding:10px 12px;text-align:left">Status</th>
          <th style="padding:10px 12px;text-align:right">Amount</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`);
  };
  const printFns={sales:printSales,stock:printStock,expenses:printExp,payments:printPayments,audit:printAud};
  const fPend=(invoices||[]).filter(i=>i.paymentStatus!=="Received"&&i.status==="Posted");
  const counts={sales:`${fInv.length} invoices · Total: ${fmtCur(fInv.reduce((s,i)=>s+(i.total||0),0))}`,stock:`${fSto.length} items`,expenses:`${fExp.length} expenses · Total: ${fmtCur(fExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0))}`,payments:`${fPend.length} pending · ${fmtCur(fPend.reduce((s,i)=>s+(parseFloat(i.total)||0),0))}`,audit:`${fAud.length} records`};
  return(
    <div style={{padding:"20px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{color:T.text,fontWeight:800,fontSize:22}}>Reports</h2>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <Inp type="date" value={dr.from} onChange={e=>setDr(p=>({...p,from:e.target.value}))} style={{colorScheme:"dark",color:T.text,padding:"6px 10px",fontSize:12}}/>
          <span style={{color:T.muted,fontSize:12}}>to</span>
          <Inp type="date" value={dr.to} onChange={e=>setDr(p=>({...p,to:e.target.value}))} style={{colorScheme:"dark",color:T.text,padding:"6px 10px",fontSize:12}}/>
          {(dr.from||dr.to)&&<Btn v="outline" size="sm" onClick={()=>setDr({from:"",to:""})}>Clear</Btn>}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {TABS.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:tab===id?"#3b82f6":"#1e293b",color:tab===id?"white":"#94a3b8",transition:"all .2s"}}>{label}</button>
        ))}
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{color:T.muted,fontSize:13}}>{counts[tab]}</div>
          <div style={{display:"flex",gap:8}}>
            {tab==="audit"&&<Btn v="outline" size="sm" onClick={()=>exportCSV("activity",["Sr No","Time","User","Action","Module","Detail"],fAud.map((a,i)=>[(i+1),a.ts,a.user,a.action,a.module,a.detail]))}><Icon n="export" size={13}/>CSV</Btn>}
            <Btn size="sm" onClick={printFns[tab]}><Icon n="print" size={13}/>Print / PDF</Btn>
          </div>
        </div>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            {tab==="sales"&&<>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}><TH c="Sr No"/><TH c="Invoice No"/><TH c="Vendor"/><TH c="Date"/><TH c="Items"/><TH c="Amount"/></tr></thead>
              <tbody>
                {fInv.length===0&&<tr><td colSpan={6}><div style={{padding:40,textAlign:"center",color:T.muted}}>No posted invoices in range</div></td></tr>}
                {fInv.map((inv,i)=><TR key={inv.id}><TD style={{color:T.muted}}>{i+1}</TD><TD style={{fontWeight:700,color:"#3b82f6"}}>{inv.invoiceNo}</TD><TD>{inv.vendor||inv.vendorName||"—"}</TD><TD>{inv.invoiceDate||inv.date||"—"}</TD><TD>{(inv.items||[]).length}</TD><TD style={{fontWeight:700,color:"#10b981"}}>{fmtCur(inv.total||0)}</TD></TR>)}
              </tbody>
            </>}
            {tab==="stock"&&<>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}><TH c="Sr No"/><TH c="Name"/><TH c="SKU"/><TH c="Category"/><TH c="Qty"/><TH c="Buy"/><TH c="Sell"/><TH c="Location"/></tr></thead>
              <tbody>
                {fSto.length===0&&<tr><td colSpan={8}><div style={{padding:40,textAlign:"center",color:T.muted}}>No stock items</div></td></tr>}
                {fSto.map((s,i)=><TR key={s.id}><TD style={{color:T.muted}}>{i+1}</TD><TD style={{fontWeight:700}}>{s.name}</TD><TD><Badge v="info">{s.category||"—"}</Badge></TD><TD>{s.qty} {s.unit}</TD><TD style={{fontWeight:700,color:"#10b981"}}>{fmtCur(s.sellPrice||0)}</TD></TR>)}
              </tbody>
            </>}
            {tab==="expenses"&&<>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}><TH c="Sr No"/><TH c="Date"/><TH c="Category"/><TH c="Amount"/><TH c="Note"/></tr></thead>
              <tbody>
                {fExp.length===0&&<tr><td colSpan={5}><div style={{padding:40,textAlign:"center",color:T.muted}}>No expenses in range</div></td></tr>}
                {fExp.map((e,i)=><TR key={e.id}><TD style={{color:T.muted}}>{i+1}</TD><TD>{e.date||e.createdAt||"—"}</TD><TD><Badge v="warning">{e.category}</Badge></TD><TD style={{fontWeight:700,color:"#10b981"}}>{fmtCur(parseFloat(e.amount)||0)}</TD><TD style={{color:T.muted}}>{e.note||e.description||"—"}</TD></TR>)}
              </tbody>
            </>}
            {tab==="payments"&&<>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}>
                <TH c="Invoice#"/><TH c="Vendor"/><TH c="Date"/><TH c="Due Date"/><TH c="Status"/><TH c="Amount" right/>
              </tr></thead>
              <tbody>
                {(()=>{
                  const byV={};
                  fPend.forEach(inv=>{
                    const vn=inv.vendorName||(vendors.find(v=>String(v.id)===String(inv.vendorId))?.name)||"Unknown";
                    if(!byV[vn]) byV[vn]={name:vn,invs:[],tot:0};
                    byV[vn].invs.push(inv);byV[vn].tot+=parseFloat(inv.total)||0;
                  });
                  const today=new Date().toISOString().slice(0,10);
                  return Object.values(byV).sort((a,b)=>b.tot-a.tot).flatMap((v,vi)=>[
                    <tr key={"h"+vi} style={{background:"rgba(245,158,11,.12)"}}>
                      <td colSpan={6} style={{padding:"8px 14px",fontWeight:900,color:"#f59e0b",fontSize:13}}>
                        🏢 {v.name} &nbsp;·&nbsp; Pending: {fmtCur(v.tot)}
                      </td>
                    </tr>,
                    ...v.invs.map((inv,i)=>(
                      <TR key={inv.id} onClick={()=>{}}>
                        <TD bold>{inv.invoiceNo}</TD>
                        <TD>{inv.vendorName||"—"}</TD>
                        <TD>{inv.date||"—"}</TD>
                        <TD>{inv.dueDate||"—"}</TD>
                        <TD><span style={{
                          color:inv.dueDate<today?"#ef4444":inv.dueDate===today?"#f97316":"#f59e0b",
                          fontWeight:700,fontSize:11
                        }}>{inv.dueDate<today?"🚨 Overdue":inv.dueDate===today?"💰 Due Today":"⏳ Upcoming"}</span></TD>
                        <TD right bold color="#dc2626">{fmtCur(inv.total)}</TD>
                      </TR>
                    ))
                  ]);
                })()}
                {fPend.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:40,color:T.muted}}>✅ No pending payments!</td></tr>}
              </tbody>
            </>}
            {tab==="audit"&&<>
              <thead><tr style={{borderBottom:`1px solid ${T.border}`}}><TH c="Sr No"/><TH c="Time"/><TH c="User"/><TH c="Action"/><TH c="Module"/><TH c="Detail"/></tr></thead>
              <tbody>
                {fAud.length===0&&<tr><td colSpan={6}><div style={{padding:40,textAlign:"center",color:T.muted}}>No activity records</div></td></tr>}
                {fAud.map((a,i)=><TR key={a.id||i}><TD style={{color:T.muted}}>{i+1}</TD><TD style={{fontFamily:"monospace",fontSize:11,color:T.dim}}>{a.ts}</TD><TD style={{fontWeight:700}}>{a.user||"—"}</TD><TD><Badge v="info">{a.action||"—"}</Badge></TD><TD style={{color:T.muted}}>{a.module||"—"}</TD><TD style={{color:T.dim,fontSize:12}}>{a.detail||"—"}</TD></TR>)}
              </tbody>
            </>}
          </table>
        </div>
      </Card>
    </div>
  );
}

function Users({currentUser,users,setUsers,addToast,addAudit}){
  const [modal,setModal]=useState(null);
  const [f,setF]=useState({});
  const [q,setQ]=useState("");
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const list=users.filter(u=>u.name.toLowerCase().includes(q.toLowerCase())||u.email.toLowerCase().includes(q.toLowerCase()));
  const save=()=>{
    if(!f.name||!f.email){addToast("Name & email required","error");return;}
    if(modal==="add"){setUsers(p=>[...p,{...f,id:uid(),share:parseFloat(f.share)||0,avatar:f.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),createdAt:todayStr()}]);addAudit("Add User","Users",`Added ${f.name}`);}
    else{setUsers(p=>p.map(u=>u.id===f.id?{...f,share:parseFloat(f.share)||0}:u));addAudit("Edit User","Users",`Updated ${f.name}`);}
    addToast(`User ${modal==="add"?"created":"updated"}!`,"success");setModal(null);
  };
  const del=u=>{if(u.id===currentUser.id){addToast("Cannot delete your own account","error");return;}setUsers(p=>p.filter(x=>x.id!==u.id));addAudit("Delete User","Users",`Deleted ${u.name}`);addToast("User deleted","info");};
  const toggle=u=>{setUsers(p=>p.map(x=>x.id===u.id?{...x,active:!x.active}:x));};
  const roleV={Admin:"purple",Manager:"info",Viewer:"gray"};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>User Management</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>{users.length} users · {users.filter(u=>u.active).length} active</p></div>
        {currentUser.role==="Admin"&&<Btn onClick={()=>{setF({name:"",email:"",password:"",role:"Viewer",active:true,partner:"",share:0});setModal("add");}}><Icon n="plus" size={15}/>Add User</Btn>}
      </div>
      <Card>
        <CardH title={`${list.length} users`} right={<SearchBox value={q} onChange={setQ} placeholder="Name or email..."/>}/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="User"/><TH c="Role"/><TH c="Joined"/><TH c="Status"/><TH c="Actions"/></tr></thead>
            <tbody>{list.map(u=>(
              <TR key={u.id}>
                <TD>
                  <div style={{display:"flex",alignItems:"center",gap:11}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:"white",flexShrink:0}}>{u.avatar}</div>
                    <div><div style={{fontWeight:700,color:T.text}}>{u.name}</div><div style={{fontSize:11,color:T.muted}}>{u.email}</div></div>
                  </div>
                </TD>
                <TD><Badge v={roleV[u.role]||"gray"}>{u.role}</Badge></TD>
                                <TD style={{color:T.muted,fontSize:12}}>{fmtDate(u.createdAt)}</TD>
                <TD><Badge v={u.active?"success":"danger"} dot>{u.active?"Active":"Inactive"}</Badge></TD>
                <TD>
                  <div style={{display:"flex",gap:5}}>
                    <Btn v="outline" size="xs" onClick={()=>{setF({...u});setModal("edit");}}><Icon n="edit" size={11}/></Btn>
                    <Btn v={u.active?"warning":"success"} size="xs" onClick={()=>toggle(u)}>{u.active?"Disable":"Enable"}</Btn>
                    {currentUser.role==="Admin"&&<Btn v="danger" size="xs" onClick={()=>del(u)}><Icon n="trash" size={11}/></Btn>}
                  </div>
                </TD>
              </TR>
            ))}</tbody>
          </table>
        </div>
      </Card>
      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal==="add"?"Add User":"Edit User"} size="sm"

//  AUDIT TRAIL
// ═══════════════════════════════════════════════════════════════
function AuditTrail({audit,addToast}){
  const [q,setQ]=useState("");const [modF,setModF]=useState("All");
  const mods=["All",...new Set(audit.map(a=>a.module))];
  const list=(audit||[]).filter(a=>{try{const u=(a.user||"").toLowerCase(),ac=(a.action||"").toLowerCase(),d=(a.detail||"").toLowerCase(),lq=q.toLowerCase();return(u.includes(lq)||ac.includes(lq)||d.includes(lq))&&(modF==="All"||a.module===modF);}catch(e){return true;}});
  const actV=a=>a.includes("Delete")||a.includes("Unpost")?"danger":a.includes("Create")||a.includes("Add")||a.includes("Post")?"success":a.includes("Login")?"info":"gray";
  const modV={Auth:"info",Invoice:"success",Stock:"warning",Vendor:"purple",PO:"orange",Finance:"danger",Users:"gray"};
  const doExport=()=>{exportCSV("audit.csv",["Timestamp","User","Action","Module","Detail"],audit.map(a=>[a.ts,a.user,a.action,a.module,a.detail]));addToast("Exported audit.csv","success");};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Audit Trail</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>Complete log of all system actions</p></div>
        <Btn v="outline" size="sm" onClick={doExport}><Icon n="csv" size={14}/>Export CSV</Btn>
      </div>
      <Card>
        <CardH title={`${list.length} entries`} right={
          <div style={{display:"flex",gap:10}}>
            <SearchBox value={q} onChange={setQ} placeholder="User, action, detail..."/>
            <Sel value={modF} onChange={e=>setModF(e.target.value)} style={{width:"auto",padding:"7px 12px"}}>{mods.map(m=><option key={m}>{m}</option>)}</Sel>
          </div>
        }/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Timestamp"/><TH c="User"/><TH c="Action"/><TH c="Module"/><TH c="Detail"/></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={5}><div style={{padding:40,textAlign:"center",color:"#475569"}}><p>No matching entries</p></div></td></tr>}
              {list.map(log=>(
                <TR key={log.id}>
                  <TD style={{fontFamily:"monospace",fontSize:11,color:T.muted,whiteSpace:"nowrap"}}>{log.ts}</TD>
                  <TD style={{fontWeight:700,color:T.text}}>{log.user}</TD>
                  <TD><Badge v={actV(log.action)}>{log.action}</Badge></TD>
                  <TD><Badge v={modV[log.module]||"gray"}>{log.module}</Badge></TD>
                  <TD style={{fontSize:12,color:T.dim}}>{log.detail}</TD>
                </TR>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function Settings({user,addToast,bizInfo=INIT_BIZ,setBizInfo}){

  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const backup=()=>{
    setBusy(true);
    try{
      const keys=['biz','vendors','stock','invoices','pos','expenses','users','employees','audit','notifs','movements'];
      const data={exportedAt:new Date().toISOString(),version:'SilkyTouch-v1',appName:'Silky Touch'};
      keys.forEach(k=>{try{const v=localStorage.getItem('st_'+k);if(v)data[k]=JSON.parse(v);}catch(e){}});
      const json=JSON.stringify(data,null,2);
      const a=document.createElement('a');
      a.href='data:application/json;charset=utf-8,'+encodeURIComponent(json);
      a.download='SilkyTouch-Backup-'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a);a.click();
      setTimeout(()=>{try{document.body.removeChild(a);}catch(e){}},300);
      addToast('✅ Backup downloaded!','success');
    }catch(err){addToast('Backup failed: '+err.message,'error');}
    setBusy(false);
  };
  
  const restore=(file)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.exportedAt&&!data.version){addToast('Invalid backup file','error');return;}
        const keys=['biz','vendors','stock','invoices','pos','expenses','users','employees','audit','notifs','movements'];
        let n=0;
        keys.forEach(k=>{if(data[k]!==undefined){try{localStorage.setItem('st_'+k,JSON.stringify(data[k]));n++;}catch(ex){}}});
        if(window.fbDB&&navigator.onLine){
          const uid=JSON.parse(localStorage.getItem('st_user')||'{}')?.id||'u1';
          keys.forEach(k=>{if(data[k])window.saveUserData&&window.saveUserData(uid,k,data[k]);});
        }
        addToast('✅ Restored '+n+' sections! Reloading...','success');
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){addToast('Restore failed: '+err.message,'error');}
    };
    reader.readAsText(file);
  };
  
  const saveBiz=()=>{
    setBizInfo({...f,taxRate:parseFloat(f.taxRate)||0});
    setSaved(true);
    addToast("Business information saved! Changes are now live on all invoices & POs.","success");
    setTimeout(()=>setSaved(false),3000);
  };
  const saveBizModal=()=>{const updated={...bizF};setBizInfo(updated);setF(updated);setShowBizModal(false);addToast("Business info saved!","success");};
  return(
    <div style={{padding:24}}>

        </div>
        <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"#0b1525",border:"1px solid #1e3a8a",borderRadius:10,padding:16,marginBottom:4}}>
            <div style={{fontSize:10,color:"#3b82f6",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Current Business Info</div>
            <div style={{fontWeight:700,fontSize:15,color:T.text}}>{bizInfo.name||"—"}</div>
            <div style={{fontSize:12,color:T.muted}}>{bizInfo.address||"—"}</div>
            <div style={{fontSize:12,color:T.muted}}>{bizInfo.phone||"—"} · {bizInfo.email||"—"}</div>
            <div style={{fontSize:12,color:T.muted}}>NTN: {bizInfo.ntn||"—"}</div>
          </div>
        </div>
      </Card>
      
      <Card style={{marginBottom:20}}>
        <CardH title="Session & Notifications"/>
        <div style={{padding:20}}>
          <div style={{fontSize:13,color:T.muted,marginBottom:12}}>Logged in as <b style={{color:T.text}}>{user?.name||user?.email}</b> · Role: <b style={{color:"#3b82f6"}}>{user?.role||"Admin"}</b></div>
          <Btn v="outline" size="sm" onClick={async()=>{const ok=await window.requestNotifPermission?.();addToast(ok?"✅ Notifications enabled! You will receive payment alerts.":"❌ Notifications blocked. Please allow in browser settings.","info");}}>🔔 Enable Push Notifications</Btn>
        </div>
      </Card>
      {/* Data Management Card */}
      <Card style={{marginBottom:20}}>
        <CardH title="Data Management" sub="Backup & sync your app data"/>
        <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.2)",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#93c5fd",lineHeight:1.6}}>
            💾 <strong>Backup:</strong> Downloads all data as JSON file to your device.<br/>
            🔄 <strong>Restore:</strong> Select a backup JSON file to restore all data.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button onClick={backup} disabled={busy} style={{padding:"12px 16px",background:"linear-gradient(135deg,#1e3a8a,#2563eb)",color:"white",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:busy?0.7:1}}>
