  <style>
    /* ── RESET ── */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0f172a;}
    body{font-family:system-ui,sans-serif;overscroll-behavior:none;}
    #root{min-height:100%;background:#0f172a;}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#1e293b}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
    input[type="date"]{color-scheme:dark;color:#f1f5f9!important;}

    /* ── SIDEBAR: Mobile first ── */
    /* Hidden by default - slides in from left */
    .sb{
      position:fixed !important;
      left:0 !important;top:0 !important;bottom:0 !important;
      width:260px !important;
      z-index:1000 !important;
      transform:translateX(-260px) !important;
      transition:transform .28s ease !important;
    }
    /* Inline styles can never override !important CSS */
    /* Open state */
    .sb.open{transform:translateX(0) !important;}

    /* ── MAIN CONTENT ── */
    .mc{
      margin-left:0;
      min-height:100vh;
      width:100%;
    }

    /* ── DESKTOP (768px+): Sidebar always visible ── */
    @media(min-width:768px){
      .sb{transform:translateX(0) !important;}
      .mc{margin-left:260px !important;width:calc(100% - 260px) !important;}
    }

    /* ── MOBILE tables ── */
    @media(max-width:767px){
      table{font-size:12px;}
    }

    /* ── SAFE AREA (notch/status bar) ── */
    body{padding-top:env(safe-area-inset-top);}

    /* ── PWA standalone ── */
    @media(display-mode:standalone){
      body{padding-top:env(safe-area-inset-top);}
      #pwa-banner{display:none!important;}
    }

    /* ── PRINT AREAS ── */
    #inv-print-area,#po-print-area{width:100%;box-sizing:border-box;}
    /* Splash screen */
    #splash{position:fixed;inset:0;background:#0f172a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    /* PWA install banner - hidden by default */
    #ib{display:none !important;}
    #ib.show{display:flex !important;}
    /* Error screen - hidden by default */
    #err{display:none;}

    /* ── ANIMATED SPLASH ── */
    #splash{
      position:fixed;inset:0;
      background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%);
      background-size:200% 200%;
      animation:splashBg 3s ease infinite;
      z-index:99999;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      transition:opacity .5s ease;
    }
    @keyframes splashBg{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    #splash-logo-wrap{
      display:flex;flex-direction:column;align-items:center;
      animation:splashPop .7s cubic-bezier(.34,1.56,.64,1) forwards;
      opacity:0;transform:scale(.4);
    }
    @keyframes splashPop{
      to{opacity:1;transform:scale(1);}
    }
    #splash-logo-img{
      width:120px;height:120px;
      object-fit:contain;
      border-radius:20px;
      background:white;
      padding:8px;
      box-shadow:0 20px 60px rgba(59,130,246,.5);
      margin-bottom:16px;
    }
    #splash-brand{
      font-size:28px;font-weight:900;color:white;
      letter-spacing:2px;font-family:system-ui,sans-serif;
      text-shadow:0 2px 20px rgba(255,255,255,.3);
    }
    #splash-tagline{
      font-size:13px;color:#93c5fd;margin-top:6px;
      font-family:system-ui,sans-serif;letter-spacing:1px;
    }
    #splash-bar{
      position:absolute;bottom:60px;
      width:200px;height:3px;
      background:rgba(255,255,255,.15);
      border-radius:3px;overflow:hidden;
    }
    #splash-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,#3b82f6,#60a5fa,#93c5fd);
      border-radius:3px;
      transition:width .15s ease;
      box-shadow:0 0 10px rgba(96,165,250,.8);
    }
    #splash-text{
      position:absolute;bottom:30px;
      font-size:12px;color:rgba(255,255,255,.4);
      font-family:system-ui,sans-serif;
      animation:pulse 1.5s ease infinite;
    }
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    #splash-dev{
      font-size:12px;color:#93c5fd;margin-top:14px;
      font-family:system-ui,sans-serif;
      animation:fadeInUp .8s ease .5s both;
    }
    #splash-dev strong{color:white;}
    #splash-powered{
      font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;
      font-family:system-ui,sans-serif;
      animation:fadeInUp .8s ease .7s both;
    }
    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;transform:translateY(0);}
    }
    /* Particles */
    #splash::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(circle at 20% 80%, rgba(59,130,246,.15) 0%, transparent 50%),
                 radial-gradient(circle at 80% 20%, rgba(139,92,246,.15) 0%, transparent 50%);
      pointer-events:none;
    }
</style>

  <script>
    // PWA Install Prompt
    window.__installPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__installPrompt = e;
      // Show install button in app
      var btn = document.getElementById('pwa-install-btn');
      if(btn) btn.style.display = 'flex';
      // Show banner
      var banner = document.getElementById('pwa-banner');
      if(banner) banner.style.display = 'flex';
    });
    window.addEventListener('appinstalled', function() {
      window.__installPrompt = null;
      var btn = document.getElementById('pwa-install-btn');
      if(btn) btn.style.display = 'none';
    });
    window.__triggerInstall = function() {
      if(window.__installPrompt) {
        window.__installPrompt.prompt();
        window.__installPrompt.userChoice.then(function(r) {
          window.__installPrompt = null;
        });
      } else {
        alert('To install: tap browser menu → "Add to Home Screen" or "Install App"');
      }
    };
  </script>

  <script>
    // ── Web Push Notification Support ──
    window.requestNotifPermission = async function() {
      if (typeof Notification === "undefined" || !("Notification" in window)) return false;
      if (Notification.permission === "granted") return true;
      if (Notification.permission !== "denied") {
        const p = await Notification.requestPermission();
        return p === "granted";
      }
      return false;
    };
    window.sendPushNotif = function(title, body) {
      if (typeof Notification === "undefined") return;
      if (Notification.permission !== "granted") return;
      try {
        if(window.__swReg && window.__swReg.showNotification){
          window.__swReg.showNotification(title, {
            body: body||'', tag:'silkytouch-'+Date.now(), vibrate:[200,100,200], requireInteraction:false
          });
          return;
        }
        var n=new Notification(title,{body:body||'',tag:title,requireInteraction:false});
        n.onclick=function(){window.focus();n.close();};
        setTimeout(function(){try{n.close();}catch(e){}},8000);
      } catch(e) { console.warn('Push notif:',e); }
    };;
    // Auto request permission when app loads
    window.addEventListener('load', function() {
      setTimeout(window.requestNotifPermission, 2000);
    });
  </script>

  <script>
// ══════════════════════════════════════════════════════════
//  HYBRID STORAGE: Firebase (online) + IndexedDB (offline)
//  Data saves locally always, syncs to cloud when online
// ══════════════════════════════════════════════════════════

// ── IndexedDB (offline storage) ──
const DB_NAME='SilkyTouchDB', DB_VER=1, STORE='appdata';
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE))e.target.result.createObjectStore(STORE,{keyPath:'key'});};
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}

// ── Firebase Config ──
const FB_CONFIG={
  apiKey:"AIzaSyAscaPrYgT2nUgyDwM7VCvGp_Pi9bJei_s",
  authDomain:"silkytouch-app.firebaseapp.com",
  projectId:"silkytouch-app",
  storageBucket:"silkytouch-app.appspot.com",
  messagingSenderId:"123456789",
  appId:"1:123456789:web:abc123"
};

// ── Save: localStorage + IndexedDB (immediate) + Firebase (when online) ──
window.saveUserData=async function(uid,key,value){
  // 1. localStorage (instant)
  try{localStorage.setItem('st_'+key,JSON.stringify(value));}catch(e){}
  // 2. IndexedDB (offline permanent)
  try{
    const db=await openDB();
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put({key,value:JSON.stringify(value),updatedAt:Date.now()});
  }catch(e){}
  // 3. Firebase (when online)
  try{
    if(window.fbDB&&navigator.onLine){
      await window.fbDB.collection('shared').doc('main').set(
        {[key]:JSON.stringify(value),updatedAt:Date.now()},{merge:true}
      );
    }
  }catch(e){
    // Offline - data is safe in IndexedDB, will sync when online
    console.log('Offline - saved locally, will sync when online');
  }
};

// ── Load: try Firebase first, fallback to IndexedDB/localStorage ──
window.loadUserData=async function(uid){
  const result={};
  const keys=['biz','vendors','stock','invoices','pos','expenses','users','employees','audit','notifs','movements'];
  // Try Firebase first (if online)
  try{
    if(window.fbDB&&navigator.onLine){
      const doc=await window.fbDB.collection('shared').doc('main').get();
      if(doc.exists){
        const data=doc.data();
        keys.forEach(k=>{if(data[k]){try{result[k]=JSON.parse(data[k]);}catch(e){}}});
        if(Object.keys(result).length>0){
          // Also update local storage with fresh cloud data
          keys.forEach(k=>{if(result[k])try{localStorage.setItem('st_'+k,JSON.stringify(result[k]));}catch(e){}});
          return result;
        }
      }
    }
  }catch(e){}
  // Fallback: IndexedDB
  try{
    const db=await openDB();
    const tx=db.transaction(STORE,'readonly');
    const items=await new Promise((res,rej)=>{const r=tx.objectStore(STORE).getAll();r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});
    items.forEach(item=>{try{result[item.key]=JSON.parse(item.value);}catch(e){}});
  }catch(e){}
  // Fallback: localStorage
  keys.forEach(k=>{if(!result[k]){try{const v=localStorage.getItem('st_'+k);if(v)result[k]=JSON.parse(v);}catch(e){}}});
  return Object.keys(result).length>0?result:null;
};

// ── Auto-sync to Firebase when internet comes back ──
window.addEventListener('online',async function(){
  console.log('Back online - syncing to Firebase...');
  const keys=['biz','vendors','stock','invoices','pos','expenses','users','employees','audit','notifs'];
  if(!window.fbDB) return;
  const batch={};
  keys.forEach(k=>{try{const v=localStorage.getItem('st_'+k);if(v){batch[k]=v;batch.updatedAt=Date.now();}}catch(e){}});
  try{await window.fbDB.collection('shared').doc('main').set(batch,{merge:true});console.log('Synced to Firebase!');}catch(e){}
});

window.startRealtimeSync=function(callback){
  if(!window.fbDB) return ()=>{};
  return window.fbDB.collection('shared').doc('main').onSnapshot(doc=>{
    if(doc.exists){
      const data=doc.data();const result={};
      ['biz','vendors','stock','invoices','pos','expenses','users','employees','audit','notifs'].forEach(k=>{if(data[k])try{result[k]=JSON.parse(data[k]);}catch(e){}});
      if(Object.keys(result).length>0) callback(result);
    }
  },err=>console.warn('Sync err:',err));
};
</script>

function makeBars(val="0"){
  let h=0;for(const c of val)h=((h<<5)-h)+c.charCodeAt(0);
  const s=Math.abs(h);return Array.from({length:40},(_,i)=>((s>>(i%16))&3)+1);
}
function QRPattern({value=""}){
  // deterministic 11x11 dot matrix from hash
  let h=0;for(const c of value+value)h=((h<<5)-h)+c.charCodeAt(0);
  const cells=Array.from({length:121},(_,i)=>(Math.abs(h^(i*7919))%3)!==0);
  // force fixed-position squares
  for(const [r,col] of [[0,0],[0,1],[1,0],[1,1],[0,9],[0,10],[1,9],[1,10],[9,0],[10,0],[9,1],[10,1]]){
    cells[r*11+col]=true;
  }
  return(
    <svg width={88} height={88} viewBox="0 0 11 11">
      {cells.map((on,i)=>on?<rect key={i} x={i%11} y={Math.floor(i/11)} width={1} height={1} fill="#111"/>:null)}
    </svg>
  );
}

// ═══════════════════════════════════════════════════════════════
//  CSV EXPORT UTILITY
// ═══════════════════════════════════════════════════════════════
function exportCSV(filename,headers,rows){
  const esc=v=>typeof v==="string"&&v.includes(",") ? `"${v}"` : v;
  const csv=[headers.join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="info",undo)=>{
    const id=uid();
    setToasts(p=>[...p.slice(-4),{id,msg,type,undo:undo||null}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),5000);
  },[]);
  const rm=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  return{toasts,add,rm};
}
function Toasts({toasts,rm}){
  const C={success:"#10b981",error:"#ef4444",info:"#3b82f6",warning:"#f59e0b"};
  const I={success:"check",error:"x",info:"alert",warning:"alert"};
  return(
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {toasts.map(t=>(
        <div key={t.id} style={{background:"#1e293b",border:`1px solid #334155`,borderLeft:`4px solid ${C[t.type]}`,borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:11,boxShadow:"0 8px 24px rgba(0,0,0,.45)",minWidth:270,maxWidth:350,animation:"slideIn .3s ease",pointerEvents:"all"}}>
          <Icon n={I[t.type]} size={15} color={C[t.type]}/>
          <span style={{flex:1,fontSize:13,color:"#e2e8f0",lineHeight:1.4}}>{t.msg}</span>
          {t.undo&&<button onClick={()=>{t.undo();rm(t.id);}} style={{background:"#3b82f6",border:"none",color:"white",cursor:"pointer",fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:4,marginRight:4,whiteSpace:"nowrap"}}>UNDO</button>}

        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
function AuthPage({onLogin,appUsers,setAppUsers}){
  const [users,setUsers]=useState(appUsers||INIT_USERS);
  const isFirstTime=users.length===0;
  const [view,setView]=useState("login");
  const [f,setF]=useState({email:"",password:"",name:"",role:"Admin",confirmPw:""});
  const [err,setErr]=useState(""); const [ok,setOk]=useState("");
  const [pw,setPw]=useState(false);
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const iS={background:"#0b1525",border:`1px solid ${T.border}`,borderRadius:9,padding:"10px 13px 10px 40px",color:T.text,fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"};
  const login=()=>{
    setErr("");
    const emailTrim=f.email.trim().toLowerCase();
    const passTrim=f.password.trim();
    const uFound=users.find(u=>u.email&&u.email.trim().toLowerCase()===emailTrim&&u.password===passTrim);
    if(uFound&&!uFound.active){setErr("User Blocked by Admin. Contact administrator.");setLoginLoading(false);return;}
    const u=uFound&&uFound.active?uFound:null;
    if(u)onLogin(u); else setErr("Invalid email or password.");
  };
  const [googleLoading,setGoogleLoading]=useState(false);
  const goog=async()=>{
    setErr("");setGoogleLoading(true);
    try{
      if(window.location.protocol==='file:'||window.location.protocol==='content:'){
        setErr("Google login needs HTTPS. Please deploy to Vercel or use Email/Password.");
        setGoogleLoading(false);return;
      }
      if(!window.fbAuth||!window.fbProvider){setErr("Google login unavailable. Use Email/Password.");setGoogleLoading(false);return;}
      const result=await window.fbAuth.signInWithPopup(window.fbProvider);
      const gu=result.user;
      // Find or create user
      let found=appUsers.find(u=>u.email===gu.email);
      if(!found){
        found={id:gu.uid,name:gu.displayName||gu.email,email:gu.email,role:"Admin",active:true,photo:gu.photoURL||"",createdAt:new Date().toISOString()};
        setAppUsers(p=>[...p,found]);
      }
      onLogin(found);
    }catch(e){
      if(e.code==="auth/popup-closed-by-user") setErr("Google login cancelled.");
      else if(e.code==="auth/network-request-failed") setErr("No internet. Use email/password for offline login.");
      else setErr("Google login failed: "+e.message);
    }
    setGoogleLoading(false);
  };
  const register=()=>{
    setErr("");
    if(!f.name||!f.email||!f.password){setErr("All fields required.");return;}
    if(f.password!==f.confirmPw){setErr("Passwords do not match.");return;}
    if(users.find(u=>u.email===f.email)){setErr("Email already registered.");return;}
    const isFirst=users.length===0;
    const nu={id:uid(),name:f.name,email:f.email,password:f.password,
      role:isFirst?"Admin":f.role,
      share:0,avatar:f.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
      createdAt:todayStr(),active:true};
    const newUsers=[...users,nu];
    setUsers(newUsers);
    if(setAppUsers) setAppUsers(newUsers);
    try{localStorage.setItem("st_users",JSON.stringify(newUsers));}catch(e){}
    if(isFirst){
      onLogin(nu);
    } else {
      setOk("Account created! Please sign in.");setView("login");
    }
  };
  const forgot=()=>{setErr("");if(users.find(u=>u.email===f.email))setOk("Reset link sent to your email.");else setErr("Email not found.");};
;

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"radial-gradient(ellipse at 20% 50%,rgba(59,130,246,.09) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.09) 0%,transparent 60%),#0f172a",padding:20}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:20,padding:42,width:"100%",maxWidth:420,boxShadow:"0 28px 56px rgba(0,0,0,.45)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:34}}>
          <div style={{background:"white",borderRadius:12,padding:"6px 10px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}><SilkyLogo size={56}/></div>
          <div><div style={{fontWeight:900,fontSize:20,color:T.text}}>{BRAND}</div><div style={{fontSize:11,color:T.muted}}>{TAGLINE}</div></div>
        </div>
        {err&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",borderRadius:9,padding:"11px 14px",display:"flex",gap:9,alignItems:"center",marginBottom:16,fontSize:13,color:"#f87171"}}><Icon n="alert" size={15}/>{err}</div>}
        {ok &&<div style={{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",borderRadius:9,padding:"11px 14px",display:"flex",gap:9,alignItems:"center",marginBottom:16,fontSize:13,color:"#34d399"}}><Icon n="check" size={15}/>{ok}</div>}
        {view==="login"&&<>
          <div style={{fontSize:23,fontWeight:800,color:T.text,marginBottom:5}}>Welcome back</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:26}}>Sign in to manage Silky Touch</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Icon n="mail" size={15} color={T.muted}/></span><input type="email" placeholder="Email address" value={f.email} onChange={up("email")} style={iS}/></div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Icon n="lock" size={15} color={T.muted}/></span>
              <input type={pw?"text":"password"} placeholder="Password" value={f.password} onChange={up("password")} onKeyDown={e=>e.key==="Enter"&&login()} style={{...iS,paddingRight:40}}/>
              <span onClick={()=>setPw(!pw)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",cursor:"pointer"}}><Icon n={pw?"eyeoff":"eye"} size={15} color={T.muted}/></span>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={()=>setView("forgot")} style={{background:"none",border:"none",color:T.accent,fontSize:13,fontWeight:600,cursor:"pointer"}}>Forgot password?</button></div>
            <Btn onClick={login} size="lg" style={{justifyContent:"center",width:"100%"}}>Sign In</Btn>
            <div style={{display:"flex",alignItems:"center",gap:10,margin:"8px 0"}}>
              <div style={{flex:1,height:1,background:"#334155"}}/>
              <span style={{fontSize:11,color:"#64748b"}}>OR</span>
              <div style={{flex:1,height:1,background:"#334155"}}/>
            </div>
            <button onClick={goog} disabled={googleLoading} style={{width:"100%",padding:"11px 16px",background:"white",border:"1px solid #dadce0",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer",fontSize:14,fontWeight:600,color:"#3c4043",transition:"all .2s"}}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.1 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              {googleLoading?"Signing in...":"Continue with Google"}
            </button>
            
            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>


            <div style={{textAlign:"center",fontSize:13,color:T.muted}}>No account? <button onClick={()=>setView("register")} style={{background:"none",border:"none",color:T.accent,fontWeight:600,cursor:"pointer",fontSize:13}}>Register</button></div>
          </div>
        </>}
        {view==="register"&&<>
          <div style={{fontSize:23,fontWeight:800,color:T.text,marginBottom:5}}>
            {isFirstTime?"Welcome to Silky Touch":"Create Account"}
          </div>
          <div style={{fontSize:13,color:T.muted,marginBottom:26}}>
            {isFirstTime?"Set up your Admin account to get started":"Join Silky Touch management system"}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Inp placeholder="Full name" value={f.name} onChange={up("name")}/>
            <Inp type="email" placeholder="Email address" value={f.email} onChange={up("email")}/>
            {!isFirstTime&&<Sel value={f.role} onChange={up("role")}>{ROLES.map(r=><option key={r}>{r}</option>)}</Sel>}
            <Inp type="password" placeholder="Create password" value={f.password} onChange={up("password")}/>
            <Inp type="password" placeholder="Confirm password" value={f.confirmPw} onChange={up("confirmPw")}/>
            <Btn onClick={register} size="lg" style={{justifyContent:"center",width:"100%"}}>Create Account</Btn>
            <div style={{textAlign:"center",fontSize:13,color:T.muted}}>Have an account? <button onClick={()=>setView("login")} style={{background:"none",border:"none",color:T.accent,fontWeight:600,cursor:"pointer",fontSize:13}}>Sign in</button></div>
          </div>
        </>}
        {view==="forgot"&&<>
          <div style={{fontSize:23,fontWeight:800,color:T.text,marginBottom:5}}>Reset Password</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:26}}>Enter your email for a reset link</div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Inp type="email" placeholder="your@email.com" value={f.email} onChange={up("email")}/>
            <Btn onClick={forgot} size="lg" style={{justifyContent:"center",width:"100%"}}>Send Reset Link</Btn>
            <div style={{textAlign:"center"}}><button onClick={()=>setView("login")} style={{background:"none",border:"none",color:T.accent,fontWeight:600,cursor:"pointer",fontSize:13}}>← Back to login</button></div>
          </div>
        </>}
        <div style={{marginTop:30,textAlign:"center",fontSize:10,color:"#334155",borderTop:`1px solid #1e293b`,paddingTop:14}}>{FOOTER}</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  NOTIFICATION PANEL
// ═══════════════════════════════════════════════════════════════
function NotifPanel({notifs,setNotifs,onClose,addNotif=function(){}}){ const T=useTheme();
  const unread=notifs.filter(n=>!n.read).length;
  const markAll=()=>setNotifs(p=>p.map(n=>({...n,read:true})));
  const mark=id=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const del=id=>setNotifs(p=>p.filter(n=>n.id!==id));
  const C={warning:"#f59e0b",info:"#3b82f6",success:"#10b981",error:"#ef4444"};
  return(
    <div style={{position:"fixed",top:60,right:16,zIndex:300,width:340,background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,boxShadow:"0 20px 50px rgba(0,0,0,.5)",overflow:"hidden"}}>
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><span style={{fontWeight:700,color:T.text,fontSize:15}}>Notifications</span>{unread>0&&<span style={{marginLeft:8,background:"#ef4444",color:"white",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{unread}</span>}</div>
        <div style={{display:"flex",gap:8}}>
          {unread>0&&<button onClick={markAll} style={{background:"none",border:"none",color:T.accent,fontSize:12,fontWeight:600,cursor:"pointer"}}>Mark all read</button>}
          <button onClick={onClose} style={{background:"#334155",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",color:T.dim,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="x" size={13}/></button>
        </div>
      </div>
      <div style={{maxHeight:360,overflowY:"auto"}}>
        {notifs.length===0&&<div style={{padding:32,textAlign:"center",color:T.muted,fontSize:13}}>No notifications</div>}
        {notifs.map(n=>(
          <div key={n.id} onClick={()=>mark(n.id)} style={{padding:"13px 18px",borderBottom:`1px solid #1e293b`,cursor:"pointer",background:n.read?"transparent":"rgba(59,130,246,.04)",display:"flex",gap:12,alignItems:"flex-start"}}
            onMouseEnter={e=>e.currentTarget.style.background=T.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background=n.read?"transparent":"rgba(59,130,246,.04)"}>
            <div style={{width:36,height:36,borderRadius:9,background:`${C[n.type]}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Icon n={n.type==="success"?"check":n.type==="error"?"x":"alert"} size={16} color={C[n.type]}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:n.read?500:700,color:n.read?T.dim:T.text,fontSize:13}}>{n.title}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:2}}>{n.body}</div>
              {n.url&&<a href={n.url} target="_blank" rel="noreferrer" onClick={()=>{mark(n.id);addNotif("success","✅ Reminder Sent","WhatsApp reminder sent to vendor for due payment clearance.");}} style={{display:"flex",alignItems:"center",gap:6,marginTop:6,fontSize:12,color:"white",fontWeight:700,textDecoration:"none",background:"#25D366",padding:"6px 12px",borderRadius:6,justifyContent:"center"}}>📱 Send WhatsApp Reminder →</a>}
              <div style={{fontSize:11,color:"#475569",marginTop:4}}>{n.ts}</div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6",marginTop:4}}/>}
              <button onClick={e=>{e.stopPropagation();del(n.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#475569"}}><Icon n="x" size={13}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  GLOBAL SEARCH OVERLAY
// ═══════════════════════════════════════════════════════════════
function GlobalSearch({stock,invoices,vendors,onClose,navigate}){
  const [q,setQ]=useState("");
  const ref=useRef();
  useEffect(()=>{ref.current?.focus();},[]);
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[onClose]);
  const results=useMemo(()=>{
    if(q.trim().length<2)return[];
    const lq=q.toLowerCase();
    const res=[];
    invoices.filter(i=>i.invoiceNo.toLowerCase().includes(lq)||i.vendorName.toLowerCase().includes(lq)).slice(0,3).forEach(i=>res.push({type:"Invoice",label:i.invoiceNo,sub:i.vendorName+" · "+fmtCur(i.total),page:"invoices",badge:i.status==="Posted"?"success":"warning"}));
    stock.filter(i=>i.name.toLowerCase().includes(lq)||i.sku.toLowerCase().includes(lq)||i.barcode.includes(lq)).slice(0,3).forEach(i=>res.push({type:"Stock",label:i.name,sub:`SKU: ${i.sku} · Qty: ${i.qty}`,page:"stock",badge:i.qty<=i.minQty?"danger":"success"}));
    vendors.filter(v=>v.name.toLowerCase().includes(lq)||v.email.toLowerCase().includes(lq)).slice(0,3).forEach(v=>res.push({type:"Vendor",label:v.name,sub:v.email,page:"vendors",badge:v.status==="Active"?"success":"gray"}));
    return res;
  },[q,stock,invoices,vendors]);
  const typeColor={Invoice:"#3b82f6",Stock:"#10b981",Vendor:"#8b5cf6"};
  return(
    <div onClick={()=>{}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",backdropFilter:"blur(6px)",zIndex:400,display:"flex",justifyContent:"center",paddingTop:80}}>
      <div style={{width:"100%",maxWidth:580,height:"fit-content",maxHeight:"70vh",background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,overflow:"hidden",boxShadow:"0 30px 70px rgba(0,0,0,.5)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:`1px solid ${T.border}`}}>
          <Icon n="search" size={18} color={T.dim}/>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search invoices, stock, vendors..." style={{flex:1,background:"none",border:"none",outline:"none",color:T.text,fontSize:16,fontFamily:"inherit"}}/>
          <kbd style={{background:"#334155",color:T.dim,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600}}>ESC</kbd>
          <button onClick={onClose} style={{background:"#334155",border:"none",color:T.dim,width:28,height:28,borderRadius:6,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>×</button>
        </div>
        {q.length<2&&<div style={{padding:"20px 18px",color:T.muted,fontSize:13,textAlign:"center"}}>Type at least 2 characters to search…</div>}
        {q.length>=2&&results.length===0&&<div style={{padding:"20px 18px",color:T.muted,fontSize:13,textAlign:"center"}}>No results for "{q}"</div>}
        {results.length>0&&<div style={{overflowY:"auto",maxHeight:"60vh"}}>
          {results.map((r,i)=>(
            <div key={i} onClick={()=>{navigate(r.page);onClose();}}
              style={{padding:"12px 18px",borderBottom:"1px solid #162032",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}
              onMouseEnter={e=>e.currentTarget.style.background=T.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:8,height:8,borderRadius:"50%",background:typeColor[r.type],flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,color:T.text,fontSize:13}}>{r.label}</div>
                <div style={{fontSize:12,color:T.muted,marginTop:2}}>{r.sub}</div>
              </div>
              <Badge v={r.badge}>{r.type}</Badge>
            </div>
          ))}
        </div>}
      </div>
    </div>
  );
}

//  DASHBOARD
// ═══════════════════════════════════════════════════════════════
function Dashboard({stock,invoices,vendors,pos,navigate}){
  const posted=invoices.filter(i=>i.status==="Posted");
  const revenue=posted.reduce((s,i)=>s+i.total,0);
  const stockCost=stock.reduce((s,i)=>s+i.qty*i.buyPrice,0);
  const stockRetail=stock.reduce((s,i)=>s+i.qty*i.sellPrice,0);
  const low=stock.filter(i=>i.qty<=i.minQty);
  const drafts=invoices.filter(i=>i.status==="Draft");
  const pending=pos.filter(p=>p.status==="Pending");
  // Build last-6-months chart from real invoice data
  const now=new Date();
  const monthLabels=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    return d.toLocaleString("en-GB",{month:"short"});
  });
  const mData=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    const y=d.getFullYear(),m=d.getMonth();
    return invoices.filter(inv=>{
      const id=new Date(inv.date);
      return inv.status==="Posted"&&id.getFullYear()===y&&id.getMonth()===m;
    }).reduce((s,inv)=>s+inv.total,0);
  });
  const maxM=Math.max(...mData,1);
  const recent=[...invoices].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,5);
  return(
    <div style={{padding:24}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:22}}>
        <StatCard label="Total Revenue" value={fmtCur(revenue)} sub={`${invoices.filter(i=>i.status==="Posted").length} posted invoices`} subUp icon="dollar" color="#3b82f6" onClick={()=>navigate("reports")}/>
        <StatCard label="Stock Valuation" value={fmtCur(stockCost)} sub={`${stock.length} items`} subUp icon="package" color="#10b981" onClick={()=>navigate("stock")}/>
        <StatCard label="Active Vendors" value={vendors.filter(v=>v.status==="Active").length} icon="vendor" color="#8b5cf6" onClick={()=>navigate("vendors")}/>
        <StatCard label="Alerts" value={low.length+drafts.length+pending.length} sub={`${low.length} low stock · ${drafts.length} drafts`} subUp={false} icon="alert" color="#f59e0b" onClick={()=>navigate("stock")}/>
      </div>

      {low.length>0&&(
        <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:10,padding:"13px 18px",display:"flex",alignItems:"center",gap:12,marginBottom:20,fontSize:13,color:"#fbbf24",flexWrap:"wrap"}}>
          <Icon n="alert" size={17}/><strong>Low Stock:</strong> {low.map(i=>`${i.name} (${i.qty}/${i.minQty})`).join(" · ")}
          <Btn v="warning" size="xs" style={{marginLeft:"auto"}} onClick={()=>navigate("stock")}>View Stock →</Btn>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:20,marginBottom:20}}>
        {/* Bar chart */}
        <Card>
          <CardH title="Monthly Sales" right={<Badge v="info">Last 6 months</Badge>}/>
          <div style={{padding:"20px 16px 12px"}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:10,height:130}}>
              {mData.map((v,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <div style={{fontSize:9,color:T.muted,fontWeight:600,textAlign:"center"}}>{(v/1000).toFixed(0)}K</div>
                  <div style={{width:"100%",background:`linear-gradient(180deg,#3b82f6,#1d4ed8)`,borderRadius:"4px 4px 0 0",height:`${(v/maxM)*100}px`,minHeight:6,opacity:.75+i*.04}}/>
                  <div style={{fontSize:10,color:T.muted}}>{monthLabels[i]}</div>
                </div>
              ))}
            </div>
          </div>
        </Card>
        {/* Vendor perf */}
        <Card>
          <CardH title="Top Vendors" right={<Badge v="purple">{vendors.filter(v=>v.status==="Active").length} active</Badge>}/>
          <div style={{padding:18}}>
            {(()=>{
              const topV=vendors.map(v=>{
                const vi=(invoices||[]).filter(i=>String(i.vendorId)===String(v.id)&&i.status==="Posted");
                return {...v,totalValue:vi.reduce((s,i)=>s+(parseFloat(i.total)||0),0),totalOrders:vi.length};
              }).sort((a,b)=>b.totalValue-a.totalValue).slice(0,4);
              if(!topV.length) return <div style={{textAlign:"center",padding:"20px 0",color:T.muted,fontSize:13}}>No vendors yet.<br/>Add vendors to see performance.</div>;
              const maxVal=Math.max(...topV.map(v=>v.totalValue),1);
              return topV.map((v,i)=>{
                const pct=Math.min((v.totalValue/maxVal)*100,100);
                const colors=["#3b82f6","#8b5cf6","#10b981","#f59e0b"];
                return(
                  <div key={v.id} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:12,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"60%"}}>{v.name}</span>
                      <span style={{fontSize:11,color:T.muted}}>{fmtCur(v.totalValue)} · {v.totalOrders} orders</span>
                    </div>
                    <div style={{height:6,background:"#334155",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:colors[i%4],borderRadius:3,transition:"width .7s"}}/>
                    </div>
                  </div>
                );
              });
            })()}
          </div>
        </Card>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <Card>
          <CardH title="Recent Activity" right={<Btn v="ghost" size="xs" onClick={()=>navigate("invoices")}>View all →</Btn>}/>
          <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr><TH c="Invoice"/><TH c="Vendor"/><TH c="Amount"/><TH c="Status"/></tr></thead>
              <tbody>
                {recent.length===0&&<tr><td colSpan={4}><div style={{padding:24,textAlign:"center",color:T.muted,fontSize:13}}>No invoices yet</div></td></tr>}
                {recent.map(inv=>(
                <TR key={inv.id} onClick={()=>navigate("invoices")}>
                  <TD style={{color:"#60a5fa",fontWeight:700,fontFamily:"monospace"}}>{inv.invoiceNo}</TD>
                  <TD>{inv.vendorName}</TD>
                  <TD style={{fontWeight:700}}>{fmtCur(inv.total)}</TD>
                  <TD><Badge v={inv.status==="Posted"?"success":"warning"}>{inv.status}</Badge></TD>
                <TD><button onClick={()=>{if(!window.confirm("Delete this activity record?"))return;setAudit(p=>p.filter(x=>!(x.ts===a.ts&&x.user===a.user&&x.action===a.action)));addToast("Activity deleted","info");}} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",cursor:"pointer",padding:"3px 10px",borderRadius:4,fontSize:13,fontWeight:700}}>✕</button></TD>
</TR>
              ))}</tbody>
            </table>
          </div>
        </Card>
        <Card>
          <CardH title="Stock Alerts" right={<Badge v="danger">{low.length} items</Badge>}/>
          {low.length===0?<div style={{padding:40,textAlign:"center",color:T.muted}}><Icon n="check" size={36} color="#10b981"/><p style={{marginTop:10,color:"#10b981",fontWeight:600}}>All levels healthy!</p></div>:
          <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr><TH c="Item"/><TH c="Qty"/><TH c="Min"/><TH c="Status"/></tr></thead>
              <tbody>{low.map(item=>(
                <TR key={item.id} onClick={()=>navigate("stock")}>
                  <TD style={{fontWeight:600}}>{item.name}</TD>
                  <TD style={{color:item.qty===0?"#ef4444":"#f59e0b",fontWeight:700}}>{item.qty}</TD>
                  <TD style={{color:T.muted}}>{item.minQty}</TD>
                  <TD><Badge v={item.qty===0?"danger":"warning"}>{item.qty===0?"Out":"Low"}</Badge></TD>
                </TR>
              ))}</tbody>
            </table>
          </div>}
        </Card>
      </div>
      <div style={{marginTop:28,textAlign:"center",fontSize:11,color:"#1e293b"}}>{FOOTER}</div>
    </div>
  );
}

function Vendors({vendors,setVendors,addToast,addAudit,user,invoices,addNotif}){
  const invoicesSafe2=invoices||[];
  const safeNotif=addNotif||(function(){});
  const [modal,setModal]=useState(null);const [f,setF]=useState({});const [q,setQ]=useState("");const [tab,setTab]=useState("all");const [hist,setHist]=useState(null);
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const list=vendors.filter(v=>{const lq=q.toLowerCase();const m=v.name.toLowerCase().includes(lq)||v.email.toLowerCase().includes(lq)||(v.contact||"").includes(q);const t=tab==="all"||(tab==="active"&&v.status==="Active")||(tab==="inactive"&&v.status==="Inactive");return m&&t;});
  const enriched=list.map(v=>{const vis=invoicesSafe2.filter(i=>String(i.vendorId)===String(v.id));return{...v,totalOrders:vis.length,totalValue:vis.reduce((s,i)=>s+(parseFloat(i.total)||0),0)};});

  const save=()=>{
    if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("You are not authorized to add/edit vendors.","warning");setModal(null);return;}
    if(!f.name){addToast("Vendor name required","error");return;}
    if(modal==="add"){setVendors(p=>[...p,{...f,id:uid(),totalOrders:0,totalValue:0,createdAt:todayStr()}]);addAudit("Add Vendor","Vendor",`Added ${f.name}`);safeNotif("success","Vendor Added","New vendor "+f.name+" added.");}
    else{setVendors(p=>p.map(v=>v.id===f.id?f:v));addAudit("Edit Vendor","Vendor",`Updated ${f.name}`);}
    addToast(`Vendor ${modal==="add"?"added":"updated"}!`,"success");setModal(null);
  };
  const del=v=>{
    if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("You are not authorized to delete vendors.","warning");return;}
    if(!window.confirm("Are you sure to delete Vendor: "+v.name+"?"))return;
    const deleted={...v};
    setVendors(p=>p.filter(x=>x.id!==v.id));
    addAudit("Delete Vendor","Vendor","Deleted "+v.name);
    addToast("Vendor deleted [UNDO]","info",()=>setVendors(p=>[...p,deleted]));
  };
  const toggle=v=>{const ns=v.status==="Active"?"Inactive":"Active";setVendors(p=>p.map(x=>x.id===v.id?{...x,status:ns}:x));addToast(`Marked ${ns}`,"info");};
  const doExport=()=>{exportCSV("vendors.csv",["Name","Email","Contact","Category","Status","Orders","Value"],vendors.map(v=>[v.name,v.email,v.contact,v.category,v.status,v.totalOrders,v.totalValue]));addToast("Exported vendors.csv","success");};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Vendor Management</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>{vendors.length} vendors · {vendors.filter(v=>v.status==="Active").length} active</p></div>
        <div style={{display:"flex",gap:10}}><Btn v="outline" size="sm" onClick={doExport}><Icon n="csv" size={14}/>Export CSV</Btn><Btn onClick={()=>{setF({name:"",address:"",contact:"",email:"",category:"General",status:"Active"});setModal("add");}}><Icon n="plus" size={15}/>Add Vendor</Btn></div>
      </div>
      <div style={{display:"flex",gap:4,borderBottom:`1px solid ${T.border}`,marginBottom:20}}>
        {["all","active","inactive"].map(t=><div key={t} onClick={()=>setTab(t)} style={{padding:"9px 18px",cursor:"pointer",fontSize:13,fontWeight:600,color:tab===t?"#3b82f6":T.muted,borderBottom:tab===t?"2px solid #3b82f6":"2px solid transparent",marginBottom:-1,textTransform:"capitalize"}}>{t}</div>)}
      </div>
      <Card>
        <CardH title={`${list.length} vendors`} right={<SearchBox value={q} onChange={setQ} placeholder="Search vendors..."/>}/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Vendor"/><TH c="Contact"/><TH c="Category"/><TH c="Orders"/><TH c="Value"/><TH c="Status"/><TH c="Actions"/></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={7}><div style={{padding:48,textAlign:"center",color:"#475569"}}><Icon n="vendor" size={36} color="#334155"/><p style={{marginTop:10,fontWeight:600}}>No vendors found</p></div></td></tr>}
              {enriched.map(v=>(
                <TR key={v.id}>
                  <TD><div style={{fontWeight:700,color:T.text}}>{v.name}</div><div style={{fontSize:11,color:T.muted}}>{v.email}</div><div style={{fontSize:11,color:"#475569"}}>{v.address}</div></TD>
                  <TD>{v.contact}</TD>
                  <TD><Badge v="info">{v.category}</Badge></TD>
                  <TD style={{textAlign:"center"}}>{invoicesSafe2.filter(i=>String(i.vendorId)===String(v.id)&&i.status==="Posted").length}</TD>
                  <TD style={{fontWeight:600}}>{fmtCur(invoicesSafe2.filter(i=>String(i.vendorId)===String(v.id)&&i.status==="Posted").reduce((s,i)=>s+(parseFloat(i.total)||0),0))}</TD>
                  <TD><span onClick={()=>toggle(v)} style={{cursor:"pointer"}}><Badge v={v.status==="Active"?"success":"gray"} dot>{v.status}</Badge></span></TD>
                  <TD>
                    <div style={{display:"flex",gap:5}}>
                      <Btn v="outline" size="xs" onClick={()=>setHist(v)}><Icon n="eye" size={11}/>History</Btn>
                      <Btn v="outline" size="xs" onClick={()=>{setF({...v});setModal("edit");}}><Icon n="edit" size={11}/></Btn>
                      <Btn v="danger" size="xs" onClick={()=>del(v)}><Icon n="trash" size={11}/></Btn>
                    </div>
                  </TD>
                </TR>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
      <Modal open={!!modal&&modal!=="hist"} onClose={()=>setModal(null)} title={modal==="add"?"Add Vendor":"Edit Vendor"} size="md"
        footer={<><Btn v="outline" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save}><Icon n="check" size={14}/>{modal==="add"?"Add":"Save"}</Btn></>}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <FG label="Vendor Name *" full><Inp value={f.name||""} onChange={e=>{const v=e.target.value.replace(/\b\w/g,c=>c.toUpperCase());setF(p=>({...p,name:v}));}} placeholder="Company or individual"/></FG>
          <FG label="Address" full><Txt value={f.address||""} onChange={e=>{const v=e.target.value.replace(/\b\w/g,c=>c.toUpperCase());setF(p=>({...p,address:v}));}} placeholder="Full address" style={{minHeight:52}}/></FG>
          <FG label="Contact"><Inp type="tel" inputMode="numeric" value={f.contact||""} onChange={up("contact")} placeholder="03001234567"/></FG>
          
          <FG label="Category"><Sel value={f.category||"General"} onChange={up("category")}>{["General","Electronics","Raw Materials","Furniture","Stationery","Food","Textile"].map(c=><option key={c}>{c}</option>)}</Sel></FG>
          <FG label="Status"><Sel value={f.status||"Active"} onChange={up("status")}><option>Active</option><option>Inactive</option></Sel></FG>
        </div>
      </Modal>
      {hist&&<Modal open onClose={()=>setHist(null)} title={`History — ${hist.name}`} size="sm" footer={<Btn v="outline" onClick={()=>setHist(null)}>Close</Btn>}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          {[["Total Orders",hist.totalOrders,"#3b82f6"],["Total Value",fmtCur(hist.totalValue),"#10b981"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#0b1525",borderRadius:10,padding:16}}><div style={{fontSize:11,color:T.muted,marginBottom:4}}>{l}</div><div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div></div>
          ))}
        </div>
        {[["Name",hist.name],["Email",hist.email],["Phone",hist.contact],["Address",hist.address],["Category",hist.category],["Status",hist.status],["Since",fmtDate(hist.createdAt)]].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`,fontSize:13}}><span style={{color:T.muted}}>{k}</span><span style={{color:T.text,fontWeight:500}}>{v}</span></div>
        ))}
      </Modal>}
    </div>
  );
}

function BcDisplay({item}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    if(!item||!canvasRef.current) return;
    const text=item.barcode||item.sku||String(item.id||'ITEM');
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,90,90);
    // Generate QR-like pattern using text hash
    const size=9;const cell=10;
    ctx.fillStyle='#000';
    for(let r=0;r<size;r++){for(let c=0;c<size;c++){
      const hash=(text.charCodeAt((r*size+c)%text.length)*31+r*7+c*13)%100;
      if(hash<50||(r<3&&c<3)||(r<3&&c>5)||(r>5&&c<3)){
        ctx.fillRect(c*cell,r*cell,cell,cell);
      }
    }}
    // Draw finder patterns
    [[0,0],[0,6],[6,0]].forEach(([pr,pc])=>{
      ctx.strokeStyle='#000';ctx.lineWidth=1;
      ctx.strokeRect(pc*cell,pr*cell,3*cell,3*cell);
      ctx.fillRect((pc+1)*cell,(pr+1)*cell,cell,cell);
    });
  },[item?.id]);
  if(!item) return null;
  const text=item.barcode||item.sku||String(item.id||'');
  const bars=[];
  for(let ci=0;ci<text.length;ci++){const cc=text.charCodeAt(ci);for(let bi=0;bi<8;bi++){const bit=(cc>>(7-bi))&1;bars.push({w:bit?3:1,b:bit});}}
  return(
    <div id="bc-print-area">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,padding:4}}>
        <div style={{background:"white",border:"2px solid #e2e8f0",borderRadius:10,padding:12,textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>QR Code</div>
          <canvas ref={canvasRef} width={90} height={90} style={{display:"block",margin:"0 auto",border:"1px solid #e2e8f0"}}/>
          <div style={{fontSize:9,color:"#94a3b8",marginTop:6,fontFamily:"monospace"}}>{text}</div>
        </div>
        <div style={{background:"white",border:"2px solid #e2e8f0",borderRadius:10,padding:12,textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Barcode</div>
          <div style={{display:"flex",justifyContent:"center",height:50,alignItems:"center",overflow:"hidden"}}>
            {bars.map((b,i)=><div key={i} style={{width:b.w+"px",height:"44px",background:b.b?"#000":"#fff",flexShrink:0}}/>)}
          </div>
          <div style={{fontSize:9,fontFamily:"monospace",color:"#1e293b",letterSpacing:0.5,marginTop:4}}>{text}</div>
        </div>
      </div>
      <div style={{marginTop:10,padding:"8px 12px",background:"#f8fafc",borderRadius:6,fontSize:11,color:"#64748b"}}>
        <strong>SKU:</strong> {item.sku||"—"} &nbsp;|&nbsp; <strong>Stock:</strong> {item.qty} {item.unit} &nbsp;|&nbsp; <strong>Price:</strong> {fmtCur(item.sellPrice)}
      </div>
    </div>
  );
}


function Stock({stock,setStock,vendors,movements,setMovements,addToast,addAudit,user,addNotif,invoices}){
  if(!addNotif)addNotif=()=>{};if(!invoices)invoices=[];
  const [modal,setModal]=useState(null);const [f,setF]=useState({});const [q,setQ]=useState("");const [cat,setCat]=useState("All");
  const [moveItem,setMoveItem]=useState(null);const [moveF,setMoveF]=useState({type:"IN",qty:1,note:""});
  const [bcItem,setBcItem]=useState(null);const [histItem,setHistItem]=useState(null);
  const up=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const cats=["All",...new Set(stock.map(i=>i.category))];
  const low=stock.filter(i=>i.qty<=i.minQty);
  const list=stock.filter(i=>{const m=i.name.toLowerCase().includes(q.toLowerCase())||i.sku.toLowerCase().includes(q.toLowerCase())||i.barcode.includes(q);const c=cat==="All"||i.category===cat;return m&&c;});
  const save=()=>{
    if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("You are not authorized to edit stock.","warning");setModal(null);return;}
    if(!f.name){addToast("Item name required","error");return;}
    if(modal==="add"){
      const nameExists=stock.find(s=>s.name.toLowerCase()===f.name.toLowerCase());
      if(nameExists){addToast("This product already exists. Use IN/OUT option to add more quantity.","warning");return;}
      if(f.location&&f.location.trim()){
        const locExists=stock.find(s=>s.location&&s.location.toUpperCase()===f.location.toUpperCase());
        if(locExists){addToast("This Location is already in use by: "+locExists.name,"warning");return;}
      }
    }
    // SKU duplicate check always (even on edit)
    const skuExists=stock.find(s=>s.sku&&s.sku.toUpperCase()===(f.sku||"").toUpperCase()&&s.id!==f.id);
    if(skuExists){addToast("SKU already exists: "+f.sku+" — change the SKU.","warning");return;}
    if(modal==="add"){setStock(p=>[...p,{...f,id:uid(),createdAt:todayStr()}]);addNotif("success","Stock Updated","New item added to inventory.");addAudit("Add Stock","Stock",`Added ${f.name}`);}
    else{setStock(p=>p.map(i=>i.id===f.id?f:i));addAudit("Edit Stock","Stock",`Updated ${f.name}`);}
    addToast(`Item ${modal==="add"?"added":"updated"}!`,"success");setModal(null);
  };
  const del=item=>{
    if(!isSuperAdmin(user?.email)&&user?.role!=="Admin"){addToast("You are not authorized to delete stock.","warning");return;}
    if(!window.confirm("Are you sure to delete Stock entry: "+item.name+"?"))return;
    const usedInPosted=invoices.filter(inv=>inv.status==="Posted"&&(inv.items||[]).some(it=>String(it.stockId)===String(item.id)));
    if(usedInPosted.length>0){addToast("Cannot delete: Invoice is posted against "+item.name,"error");return;}
    setStock(p=>p.filter(i=>i.id!==item.id));
    addAudit("Delete Stock","Stock","Deleted "+item.name);
    addToast("Item deleted","info");
  };
  const applyMove=()=>{
    const qty=parseInt(moveF.qty)||0;
    if(qty<=0){addToast("Enter valid quantity","error");return;}
    if(moveF.type==="OUT"&&qty>moveItem.qty){addToast("Insufficient stock!","error");return;}
    setStock(p=>p.map(i=>i.id===moveItem.id?{...i,qty:moveF.type==="IN"?i.qty+qty:i.qty-qty}:i));
    setMovements(p=>[...p,{id:uid(),stockId:moveItem.id,type:moveF.type,qty,date:todayStr(),note:moveF.note,by:user?.name||"User"}]);
    addAudit(`Stock ${moveF.type}`,"Stock",`${moveF.type} ${qty} × ${moveItem.name}`);
    addToast(`${moveF.type==="IN"?"+":"-"}${qty} ${moveItem.unit} applied`,"success");
    setMoveItem(null);
  };
  const doExport=()=>{exportCSV("stock.csv",["Name","SKU","Barcode","Category","Qty","Min","BuyPrice","SellPrice","Unit","Location"],stock.map(i=>[i.name,i.sku,i.barcode,i.category,i.qty,i.minQty,i.buyPrice,i.sellPrice,i.unit,i.location]));addToast("Exported stock.csv","success");};
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:T.text}}>Stock Management</h2><p style={{fontSize:13,color:T.muted,marginTop:3}}>{stock.length} items · {low.length} low stock alerts</p></div>
        <div style={{display:"flex",gap:10}}>
          <Btn v="outline" size="sm" onClick={doExport}><Icon n="csv" size={14}/>Export CSV</Btn>
          <Btn onClick={()=>{setF({name:"",sku:"",barcode:String(Date.now()).slice(-13),category:"General",qty:"",minQty:"",buyPrice:"",sellPrice:"",unit:"Box",vendorId:"",location:""});setModal("add");}}><Icon n="plus" size={15}/>Add Item</Btn>
        </div>
      </div>
      {low.length>0&&<div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:10,padding:"12px 18px",display:"flex",alignItems:"center",gap:12,marginBottom:18,fontSize:13,color:"#fbbf24",flexWrap:"wrap"}}><Icon n="alert" size={17}/><strong>Low Stock:</strong> {low.map(i=>`${i.name} (${i.qty})`).join(" · ")}</div>}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {cats.map(c=><div key={c} onClick={()=>setCat(c)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",background:cat===c?"rgba(59,130,246,.15)":"#0b1525",border:cat===c?"1px solid rgba(59,130,246,.4)":`1px solid ${T.border}`,color:cat===c?"#60a5fa":T.dim,transition:"all .15s"}}>{c}</div>)}
      </div>
      <Card>
        <CardH title={`${list.length} items`} right={<SearchBox value={q} onChange={setQ} placeholder="Name, SKU, barcode..."/>}/>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Item"/><TH c="Category"/><TH c="Qty"/><TH c="Sell Price"/><TH c="Actions"/></tr></thead>
            <tbody>
              {list.length===0&&<tr><td colSpan={5}><div style={{padding:40,textAlign:"center",color:"#475569"}}><Icon n="package" size={36} color="#334155"/><p style={{marginTop:10}}>No items found</p></div></td></tr>}
              {list.map(item=>{
                
                const isLow=item.qty<=item.minQty,isOut=item.qty===0;
                return(
                  <TR key={item.id}>
                    <TD><div style={{fontWeight:700,color:T.text}}>{item.name}</div></TD>
                    <TD><Badge v="info">{item.category}</Badge></TD>
                    <TD>
                      <span style={{fontWeight:700,color:isOut?"#ef4444":isLow?"#f59e0b":"#10b981"}}>{item.qty}</span>
                      <span style={{fontSize:10,color:T.muted}}>/{item.minQty}</span>
                      {isLow&&<div style={{marginTop:2}}><Badge v={isOut?"danger":"warning"}>{isOut?"OUT":"LOW"}</Badge></div>}
                    </TD>
                    <TD>{fmtCur(item.sellPrice)}</TD>
                    <TD>
                      <div style={{display:"flex",gap:5}}>
                        <Btn v="success" size="xs" onClick={()=>{setMoveItem(item);setMoveF({type:"IN",qty:1,note:""});}} title="Stock In/Out">IN/OUT</Btn>
                        <Btn v="outline" size="xs" onClick={()=>setBcItem(item)} title="Barcode/QR"><Icon n="barcode" size={11}/></Btn>
                        <Btn v="outline" size="xs" onClick={()=>setHistItem(item)} title="History"><Icon n="clock" size={11}/></Btn>
                        <Btn v="outline" size="xs" onClick={()=>{setF({...item});setModal("edit");}}><Icon n="edit" size={11}/></Btn>
                        <Btn v="danger" size="xs" onClick={()=>del(item)}><Icon n="trash" size={11}/></Btn>
                      </div>
                    </TD>
                  </TR>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Add/Edit */}
      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal==="add"?"Add Stock Item":"Edit Stock Item"} size="lg"
        footer={<><Btn v="outline" onClick={()=>setModal(null)}>Cancel</Btn><Btn onClick={save}><Icon n="check" size={14}/>Save</Btn></>}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <FG label="Item Name *" full><Inp value={f.name||""} onChange={e=>{const w=e.target.value.replace(/(?:^|\s)\S/g,c=>c.toUpperCase());setF(p=>({...p,name:w}));}} placeholder="Full Product Name"/></FG>
          
          <FG label="Barcode"><Inp value={f.barcode||""} onChange={up("barcode")} placeholder="Scan or type"/></FG>
          <FG label="Category"><Sel value={f.category||"General"} onChange={up("category")}>{["Electronics","Furniture","Stationery","Raw Materials","General","Food","Textile"].map(c=><option key={c}>{c}</option>)}</Sel></FG>
          <FG label="Unit"><Sel value={f.unit||"Box"} onChange={up("unit")}>{["Box","Pcs","Kg","Ltr","Ream","Piece","Set","Meter","Dozen","Carton","Roll","Pack"].map(u=><option key={u}>{u}</option>)}</Sel></FG>
          <FG label="Quantity"><Inp type="number" value={f.qty===""||f.qty==null?"":f.qty} onChange={e=>setF(p=>({...p,qty:e.target.value===""?"":parseInt(e.target.value)||0}))}/></FG>
          <FG label="Min Qty (Low Stock Alert)"><Inp type="number" value={f.minQty===""||f.minQty==null?"":f.minQty} onChange={e=>setF(p=>({...p,minQty:e.target.value===""?"":parseInt(e.target.value)||0}))}/></FG>
          
          <FG label="Sell Price (PKR)"><Inp type="number" value={f.sellPrice===""||f.sellPrice==null?"":f.sellPrice} onChange={e=>setF(p=>({...p,sellPrice:e.target.value===""?"":parseFloat(e.target.value)||0}))}/></FG>
          
          
        </div>
      </Modal>

      {/* IN/OUT */}
      {moveItem&&<Modal open onClose={()=>setMoveItem(null)} title={`Stock Movement — ${moveItem.name}`} size="sm"
        footer={<><Btn v="outline" onClick={()=>setMoveItem(null)}>Cancel</Btn><Btn v={moveF.type==="IN"?"success":"danger"} onClick={applyMove}>Apply {moveF.type}</Btn></>}>
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {["IN","OUT"].map(t=><button key={t} onClick={()=>setMoveF(p=>({...p,type:t}))} style={{flex:1,padding:12,border:`2px solid ${moveF.type===t?(t==="IN"?"#10b981":"#ef4444"):T.border}`,borderRadius:9,background:moveF.type===t?(t==="IN"?"rgba(16,185,129,.12)":"rgba(239,68,68,.12)"):"transparent",color:moveF.type===t?(t==="IN"?"#10b981":"#ef4444"):T.muted,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
            {t==="IN"?"▲ Stock IN":"▼ Stock OUT"}
          </button>)}
        </div>
        <div style={{background:"#0b1525",borderRadius:9,padding:"11px 15px",marginBottom:16,fontSize:13}}>
          Current: <strong style={{color:moveItem.qty<=moveItem.minQty?"#f59e0b":"#10b981"}}>{moveItem.qty} {moveItem.unit}</strong> &nbsp;·&nbsp; Min: <strong style={{color:T.dim}}>{moveItem.minQty}</strong>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <FG label="Quantity"><Inp type="number" min="1" value={moveF.qty} onChange={e=>setMoveF(p=>({...p,qty:e.target.value}))}/></FG>
          <FG label="Note / Reference"><Inp value={moveF.note} onChange={e=>setMoveF(p=>({...p,note:e.target.value}))} placeholder="Invoice no, reason..."/></FG>
        </div>
      </Modal>}

      {/* Barcode + QR */}
      {bcItem&&<Modal open onClose={()=>setBcItem(null)} title={"Barcode & QR — "+bcItem.name} size="sm"
        footer={<><Btn v="outline" onClick={()=>setBcItem(null)}>Close</Btn>
          <Btn v="outline" onClick={()=>{
            const el=document.getElementById("bc-qr-only");
            if(el){const w=window.open("","_blank","width=400,height=400");if(!w){alert("Please allow popups for this app to print/download.");return;}w.document.write("<!DOCTYPE html><html><head><title>QR</title><style>*{-webkit-print-color-adjust:exact!important;}body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:Arial,sans-serif;}@page{size:A6;margin:5mm;}</style></head><body>"+el.outerHTML+"<\/body><\/html>");w.document.close();w.focus();setTimeout(()=>{w.print();},500);}
          }}><Icon n="qr" size={14}/>Print QR</Btn>
          <Btn onClick={()=>{
            const el=document.getElementById("bc-bar-only");
            if(el){const w=window.open("","_blank","width=500,height=300");if(!w){alert("Please allow popups for this app to print/download.");return;}w.document.write("<!DOCTYPE html><html><head><title>Barcode</title><style>*{-webkit-print-color-adjust:exact!important;}body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:Arial,sans-serif;}@page{size:A6 landscape;margin:5mm;}</style></head><body>"+el.outerHTML+"<\/body><\/html>");w.document.close();w.focus();setTimeout(()=>{w.print();},500);}
          }}><Icon n="barcode" size={14}/>Print Barcode</Btn></>}>
        <BcDisplay item={bcItem}/>
      </Modal>}

      {/* History */}
      {histItem&&<Modal open onClose={()=>setHistItem(null)} title={`Movement History — ${histItem.name}`} size="md"
        footer={<Btn v="outline" onClick={()=>setHistItem(null)}>Close</Btn>}>
        <div className="tbl-wrap" style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr><TH c="Date"/><TH c="Type"/><TH c="Qty"/><TH c="Note"/><TH c="By"/></tr></thead>
            <tbody>
              {movements.filter(m=>m.stockId===histItem.id).length===0?<tr><td colSpan={5} style={{padding:32,textAlign:"center",color:T.muted}}>No movements yet</td></tr>:
              movements.filter(m=>m.stockId===histItem.id).map(m=>(
                <TR key={m.id}>
                  <TD style={{fontFamily:"monospace",fontSize:12,color:T.dim}}>{fmtDate(m.date)}</TD>
                  <TD><Badge v={m.type==="IN"?"success":"danger"}>{m.type}</Badge></TD>
                  <TD style={{fontWeight:700,color:m.type==="IN"?"#10b981":"#ef4444"}}>{m.type==="IN"?"+":"-"}{m.qty}</TD>
                  <TD style={{fontSize:12,color:T.dim}}>{m.note||"—"}</TD>
                  <TD style={{color:T.muted}}>{m.by}</TD>
                </TR>
              ))}
            </tbody>
          </table>
        </div>
      </Modal>}
    </div>
  );
}

function InvPrint({inv,vendors,bizInfo=INIT_BIZ}){
  const vdr=vendors.find(v=>v.id===inv.vendorId)||{name:inv.vendorName||"—"};
  const logoSrc=(document.getElementById("_li_")||{}).src||"";
  const fmtCur=n=>"PKR "+(parseFloat(n)||0).toLocaleString("en-PK",{minimumFractionDigits:0});
  const fmtD=d=>{if(!d)return"—";try{const p=d.split("-");return p.length===3&&p[0].length===4?p[2]+"/"+p[1]+"/"+p[0]:d;}catch(e){return d;}};
  return(
    <div id="inv-print-area" style={{background:"white",color:"#111",fontFamily:"Inter,Arial,sans-serif",width:"100%",maxWidth:"100%",boxSizing:"border-box",fontSize:"clamp(11px,3vw,14px)"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",padding:"clamp(10px,3vw,18px)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {logoSrc&&<img src={logoSrc} style={{height:"clamp(36px,8vw,52px)",width:"auto",background:"white",borderRadius:5,padding:3}} onError={e=>e.target.style.display="none"}/>}
          <div>
            <div style={{fontSize:"clamp(13px,3.5vw,18px)",fontWeight:900,color:"white"}}>{bizInfo?.name||"Silky Touch"}</div>
            {bizInfo?.address&&<div style={{fontSize:"clamp(8px,2vw,10px)",color:"rgba(255,255,255,0.8)",marginTop:2}}>{bizInfo.address}</div>}
            {(bizInfo?.phone||bizInfo?.email)&&<div style={{fontSize:"clamp(8px,2vw,10px)",color:"rgba(255,255,255,0.75)"}}>{[bizInfo.phone,bizInfo.email].filter(Boolean).join(" · ")}</div>}
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"clamp(16px,4vw,22px)",fontWeight:900,color:"white",letterSpacing:1}}>INVOICE</div>
          <div style={{fontSize:"clamp(11px,2.5vw,14px)",fontWeight:700,color:"rgba(255,255,255,0.9)",marginTop:3}}>{inv.invoiceNo}</div>
          {inv.paymentStatus==="Received"&&<div style={{background:"#10b981",color:"white",padding:"2px 8px",borderRadius:20,fontSize:"clamp(9px,2vw,11px)",fontWeight:700,marginTop:3,display:"inline-block"}}>✅ PAID</div>}
        </div>

      {/* Bill To + Details */}
      <div style={{display:"flex",flexWrap:"wrap",margin:"10px 8px",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
        <div style={{flex:"1 1 45%",minWidth:140,padding:"10px 12px",borderRight:"1px solid #e2e8f0"}}>
          <div style={{fontSize:"clamp(8px,2vw,9px)",fontWeight:700,color:"#3b82f6",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Bill To</div>
          <div style={{fontWeight:700,fontSize:"clamp(12px,3vw,14px)",color:"#111"}}>{vdr.name}</div>
          {vdr.contact&&<div style={{fontSize:"clamp(9px,2.5vw,11px)",color:"#64748b",marginTop:2}}>{vdr.contact}</div>}
          {vdr.address&&<div style={{fontSize:"clamp(9px,2.5vw,11px)",color:"#64748b"}}>{vdr.address}</div>}
        </div>
        <div style={{flex:"1 1 45%",minWidth:140,padding:"10px 12px",background:"#f8fafc"}}>
          <div style={{fontSize:"clamp(8px,2vw,9px)",fontWeight:700,color:"#3b82f6",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Invoice Details</div>
          {[["Invoice No",inv.invoiceNo],["Date",fmtD(inv.date)],["Due Date",fmtD(inv.dueDate)],["Status",inv.status||"—"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:"clamp(9px,2.5vw,11px)",marginBottom:3}}>
              <span style={{color:"#64748b"}}>{l}</span>
              <span style={{fontWeight:600,color:"#111"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Items Table */}
      <div style={{margin:"0 8px",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%",minWidth:380,borderCollapse:"collapse",fontSize:"clamp(9px,2.5vw,12px)"}}>
          <thead>
            <tr style={{background:"#1e3a8a",color:"white"}}>
              {["SR#","Description","Carton","PCS","Qty","Unit Price","Total"].map((h,i)=>(
                <th key={h} style={{padding:"clamp(5px,1.5vw,8px) clamp(6px,1.5vw,10px)",textAlign:i>=2?"right":"left",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,whiteSpace:"nowrap",fontSize:"clamp(8px,2vw,10px)"}}>{h}</th>
              ))}
